<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login / SignUp</button>

<script>
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

async function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  if(!email || !pass){ alert("Въведи email и парола!"); return; }

  // 1️⃣ Опитваме Login
  let { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({ email, password: pass });

  if(loginError){
    // 2️⃣ Ако акаунтът не съществува → SignUp
    let { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password: pass });
    if(signUpError){
      alert("Грешка: " + signUpError.message);
      return;
    }
    alert("Акаунт създаден! Натисни Login пак.");
    return;
  }

  // 3️⃣ Успешен login → вземаме user
  const user = loginData.user;
  alert("Влезе успешно: " + user.email);

  // 4️⃣ Записваме session в localStorage (автоматично от Supabase)
  console.log("Session:", loginData.session);
}
</script>
</body>
</html>
