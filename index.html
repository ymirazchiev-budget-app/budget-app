<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; }
input { padding:10px; margin:5px; }

.card {
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">
<h2>🔐 Вход</h2>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->

<div id="app" style="display:none;">
<h2>💰 Budget Cloud</h2>

<h1 id="balance">0 €</h1>

<button onclick="add('income')">+ Доход</button> <button onclick="add('expense')">- Разход</button>

<div id="list"></div>
<div id="analysis" class="card"></div>
</div>

<script>
const client = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// AUTO LOGIN
window.onload = async () => {
  const { data } = await client.auth.getSession();

  if(data.session){
    user = data.session.user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load();
  }
};

// LOGIN
async function login(){
  try{
    let email=document.getElementById("email").value;
    let pass=document.getElementById("pass").value;

    if(!email || !pass){
      alert("Въведи email и парола");
      return;
    }

    let { data, error } = await client.auth.signInWithPassword({
      email, password:pass
    });

    if(error){
      alert("❌ " + error.message);
      return;
    }

    user = data.user;

    // скриваме login
    document.getElementById("login").style.display="none";

    // показваме app
    document.getElementById("app").style.display="block";

    load();

  } catch(e){
    alert("💥 Грешка: " + e.message);
    console.log(e);
  }
}

// LOAD
async function load(){
  let { data } = await client
    .from("transactions")
    .select("*")
    .eq("user_id", user.id);

  render(data || []);
}

// RENDER
function render(data){
  let bal=0;
  let list=document.getElementById("list");
  list.innerHTML="";

  let categories = {};

  data.forEach(d=>{
    let amount = Number(d.amount);
    bal += amount;

    let div=document.createElement("div");
    div.className="card";
    div.innerText = d.name + " " + amount + " €";
    list.appendChild(div);

    if(amount < 0){
      let cat = d.name.toLowerCase();

      if(!categories[cat]){
        categories[cat] = 0;
      }

      categories[cat] += Math.abs(amount);
    }
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";

  let analysisDiv = document.getElementById("analysis");
  analysisDiv.innerHTML = "<h3>📊 Разходи по категории:</h3>";

  let topCat = "";
  let max = 0;

  for(let c in categories){
    let val = categories[c];

    let p = document.createElement("div");
    p.innerText = c + ": " + val.toFixed(2) + " €";
    analysisDiv.appendChild(p);

    if(val > max){
      max = val;
      topCat = c;
    }
  }

  if(topCat){
    let top = document.createElement("div");
    top.innerHTML = "<br><b>Най-много харчиш за: " + topCat + " (" + max.toFixed(2) + " €)</b>";
    analysisDiv.appendChild(top);
  }
}

// ADD
async function add(type){
  if(!user){
    alert("Първо влез!");
    return;
  }

  let name=prompt("Категория:");
  let val=parseFloat(prompt("Сума:"));

  if(isNaN(val)) return;

  if(type==="expense") val=-val;

  await client.from("transactions").insert({
    user_id:user.id,
    profile:"Лични",
    name:name || type,
    amount:val
  });

  load();
}
</script>

</body>
</html>
