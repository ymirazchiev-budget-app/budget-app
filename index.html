<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Desktop Login</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
  input, button { padding:10px; margin:5px; border-radius:5px; border:none; }
  button { cursor:pointer; background:#22c55e; color:white; }
  #app { display:none; margin-top:20px; }
</style>
</head>
<body>

<h2>💰 Budget Desktop</h2>

<div id="login">
  <input id="email" placeholder="Email" type="email"><br>
  <input id="pass" placeholder="Парола" type="password"><br>
  <button id="loginBtn">Login / SignUp</button>
  <div id="msg" style="color:yellow; margin-top:10px;"></div>
</div>

<div id="app">
  <h1>Влязохте успешно!</h1>
  <p>Тук ще се зарежда апликацията.</p>
  <button onclick="logout()">Logout</button>
</div>

<script>
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user = null;
const msg = document.getElementById("msg");
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const loginBtn = document.getElementById("loginBtn");

// Проверка за запазена сесия
window.onload = async () => {
  const { data } = await supabase.auth.getSession();
  if(data.session){
    user = data.session.user;
    showApp();
  }
};

// Login / SignUp
loginBtn.onclick = async () => {
  msg.innerText = "";
  const email = document.getElementById("email").value;
  const password = document.getElementById("pass").value;

  if(!email || !password){
    msg.innerText = "Попълнете и двете полета!";
    return;
  }

  // Опит за login
  let { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    // Ако user не съществува, създаваме акаунт
    if(error.message.includes("Invalid login credentials") || error.message.includes("User not found")){
      let { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
      if(signUpError){
        msg.innerText = "Грешка при създаване: " + signUpError.message;
        return;
      }
      msg.innerText = "Акаунтът е създаден! Натиснете Login пак.";
      return;
    } else {
      msg.innerText = "Login грешка: " + error.message;
      return;
    }
  }

  // Успешен login
  user = data.user;
  showApp();
};

// Показване на апликацията
function showApp(){
  loginDiv.style.display = "none";
  appDiv.style.display = "block";
  msg.innerText = "";
}

// Logout
async function logout(){
  await supabase.auth.signOut();
  user = null;
  appDiv.style.display = "none";
  loginDiv.style.display = "block";
  msg.innerText = "Излязохте успешно.";
}
</script>

</body>
</html>
