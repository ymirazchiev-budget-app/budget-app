<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_STABLE_WORKING_v1</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:8px; margin:4px; border:none; border-radius:5px; cursor:pointer; }
.card { background:#1e293b; margin:3px; padding:5px; border-radius:5px; font-size:13px; }
.balance { font-size:24px; margin:10px; }
.analysis { background:#020617; padding:10px; margin:10px; border-radius:10px; }

@media print {
  body { background:white; color:black; }
  button { display:none; }
}
</style>
</head>

<body>

<h3>💰 BudgetCloud_STABLE_WORKING_v1</h3>

<div class="balance" id="balance">0.00 €</div>

<button id="btnIncome">+ Доход</button>
<button id="btnExpense">- Разход</button>
<button id="btnBonus">💎 Бонус</button>
<button onclick="window.print()">🖨️ Печат</button>

<div id="list"></div>

<div class="analysis">
  <b>📊 Разходи по категории</b>
  <div id="analysis"></div>
  <canvas id="chart"></canvas>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");
let chart;

// 🔥 BUTTONS (ГАРАНТИРАНО РАБОТЯТ)
document.getElementById("btnIncome").addEventListener("click", addIncome);
document.getElementById("btnExpense").addEventListener("click", addExpense);
document.getElementById("btnBonus").addEventListener("click", addBonus);

// ➕ ДОХОД
function addIncome(){
  let name = prompt("Доход от?");
  if(!name) return;

  let method = prompt("Средство (банка/карта/кеш)");
  if(!method) method="-";

  let val = parseFloat(prompt("Сума:").replace(",", "."));
  if(isNaN(val)) return;

  save(name, val, method);
}

// ➖ РАЗХОД
function addExpense(){
  let name = prompt("Разход за?");
  if(!name) return;

  name = autoCategory(name);

  let method = prompt("Средство");
  if(!method) method="-";

  let val = -Math.abs(parseFloat(prompt("Сума:").replace(",", ".")));
  if(isNaN(val)) return;

  save(name, val, method);
}

// 💎 БОНУС
function addBonus(){
  let val = parseFloat(prompt("Бонус:").replace(",", "."));
  if(isNaN(val)) return;

  let method = prompt("Средство");
  if(!method) method="-";

  save("бонус", val, method);
}

// 💾 SAVE (ЛОКАЛНО, СИГУРНО)
function save(name, amount, method){
  data.push({
    id: Date.now(),
    name,
    amount,
    method
  });

  localStorage.setItem("data", JSON.stringify(data));
  render();
}

// ❌ DELETE
function del(id){
  data = data.filter(t => t.id !== id);
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

// 🎨 RENDER
function render(){

  let bal=0;
  let cats={};

  const list = document.getElementById("list");
  list.innerHTML="";

  data.forEach(t=>{
    let a = Number(t.amount);
    bal += a;

    if(a<0){
      if(!cats[t.name]) cats[t.name]=0;
      cats[t.name]+=Math.abs(a);
    }

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${t.name} (${t.method}) | ${a.toFixed(2)} €
      <button onclick="del(${t.id})">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";

  const aDiv = document.getElementById("analysis");
  aDiv.innerHTML="";

  let labels=[], values=[];

  for(let c in cats){
    labels.push(c);
    values.push(cats[c]);

    let p=document.createElement("div");
    p.innerText = c + ": " + cats[c].toFixed(2)+" €";
    aDiv.appendChild(p);
  }

  draw(labels, values);
}

// 📊 GRAPH
function draw(labels, values){
  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:"#ef4444"
      }]
    }
  });
}

// категории
function autoCategory(name){
  let n = name.toLowerCase();
  if(n.includes("пица") || n.includes("храна")) return "храна";
  if(n.includes("ток")) return "ток";
  if(n.includes("пазар")) return "пазар";
  return name;
}

// старт
render();

</script>

</body>
</html>
