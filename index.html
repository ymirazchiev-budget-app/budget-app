<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_REAL_FIXED_v2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.card { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }
.balance { font-size:28px; margin:10px; }
</style>
</head>

<body>

<h2>💰 BudgetCloud_REAL_FIXED_v2</h2>

<div class="balance" id="balance">0.00 €</div>

<button onclick="addIncome()">+ Доход</button>
<button onclick="addExpense()">- Разход</button>
<button onclick="addBonus()">💎 Бонус</button>

<div id="list"></div>

<script>
let transactions = [];
let supabaseClient = null;
let user = null;

window.onload = async function(){
  try{
    if(window.supabase){
      supabaseClient = window.supabase.createClient(
        "https://ipihscvyyxetkiajjllg.supabase.co",
        "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
      );

      const { data } = await supabaseClient.auth.getSession();
      if(data.session){
        user = data.session.user;
      }
    }
  }catch(e){
    console.log("Supabase fail");
  }

  render();
};

// ➕ ДОХОД
async function addIncome(){
  let name = prompt("От къде е дохода? (напр. заплата)");
  if(!name) return;

  let source = prompt("Източник (напр. банка / Revolut)");
  if(!source) source = "-";

  let val = prompt("Сума:");
  if(!val) return;

  val = parseFloat(val.replace(",", "."));

  addTransaction(name, val, source);
}

// ➖ РАЗХОД
async function addExpense(){
  let name = prompt("За какво е разхода? (напр. храна, ток)");
  if(!name) return;

  let source = prompt("Платено от? (карта, кеш)");
  if(!source) source = "-";

  let val = prompt("Сума:");
  if(!val) return;

  val = -Math.abs(parseFloat(val.replace(",", ".")));

  addTransaction(name, val, source);
}

// 💎 БОНУС
async function addBonus(){
  let name = prompt("Какъв бонус?");
  if(!name) name="бонус";

  let source = prompt("От къде?");
  if(!source) source="-";

  let val = prompt("Сума:");
  if(!val) return;

  val = parseFloat(val.replace(",", "."));

  addTransaction(name, val, source);
}

// 🔥 ОБЩА функция
async function addTransaction(name, amount, source){

  const t = {
    id: Date.now(),
    name,
    amount,
    source
  };

  transactions.push(t);

  if(supabaseClient && user){
    try{
      await supabaseClient.from("transactions").insert({
        user_id: user.id,
        name,
        amount,
        source,
        created_at: new Date()
      });
    }catch(e){
      console.log("DB fail");
    }
  }

  render();
}

// ❌ delete
function del(id){
  transactions = transactions.filter(t => t.id !== id);
  render();
}

// 🎨 render
function render(){
  let bal = 0;
  const list = document.getElementById("list");
  list.innerHTML="";

  transactions.forEach(t=>{
    bal += t.amount;

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <b>${t.name}</b> (${t.source})<br>
      ${t.amount.toFixed(2)} €
      <button onclick="del(${t.id})">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";
}
</script>

</body>
</html>
