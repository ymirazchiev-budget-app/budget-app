<!-- само показвам ключовите промени – не пипам основата -->

<script>

// 🔹 ПРОФИЛ
let currentProfile = "личен";

function switchProfile(p){
  currentProfile = p;
  load();
}

// 🔹 ДОБАВЯНЕ (FIX БОНУС)
async function add(type){

  let category = prompt("Какво? (пример: храна, ток, заплата, хра, зап)");
  
  let client = "";
  if(type==="bonus"){
    client = prompt("От кой? (клиент/обект)");
  }

  let method = prompt("Къде? (карта / кеш / банка)");
  let amount = parseFloat(prompt("Сума"));

  if(!category || isNaN(amount)) return;

  category = normalize(category);

  if(type==="expense") amount = -Math.abs(amount);

  await db.from("transactions").insert([{
    type,
    category,
    method,
    amount,
    client,
    profile: currentProfile
  }]);

  load();
}

// 🔹 FILTER ПО ПРОФИЛ
async function load(){
  const { data } = await db.from("transactions").select("*");

  let m = month.value;

  let filtered = (data || []).filter(t => t.profile === currentProfile);

  if(m !== "all"){
    filtered = filtered.filter(t => new Date(t.created_at).getMonth()+1 == m);
  }

  render(filtered);
}

// 🔹 АНАЛИЗ ПО МЕТОД
function methodAnalysis(data){

  let map = {};

  data.forEach(t=>{
    let key = t.method || "друго";
    map[key] = (map[key]||0) + t.amount;
  });

  return Object.entries(map)
    .map(([k,v])=>`${k}: ${Math.abs(v).toFixed(2)} €`)
    .join("<br>");
}

function render(data){

  let incArr = data.filter(t=>t.type==="income"||t.type==="bonus");
  let expArr = data.filter(t=>t.type==="expense");

  let incG = group(incArr);
  let expG = group(expArr);

  // 👇 БОНУС С ОБЕКТ
  inc.innerHTML = incArr.map(t=>
    `<div class="small">
    ${formatDate(t.created_at)} | 
    ${t.category} ${t.client ? "["+t.client+"]" : ""} 
    (${t.method}) ${t.amount.toFixed(2)}€
    <button onclick="del('${t.id}')">X</button>
    </div>`
  ).join("");

  exp.innerHTML = expArr.map(t=>
    `<div class="small">
    ${formatDate(t.created_at)} | 
    ${t.category} (${t.method}) ${t.amount.toFixed(2)}€
    <button onclick="del('${t.id}')">X</button>
    </div>`
  ).join("");

  // 🔹 АНАЛИЗ ПО МЕТОД
  incA.innerHTML =
    "Доход: "+Object.values(incG).reduce((a,b)=>a+b,0).toFixed(2)+" €<br>" +
    "<b>Методи:</b><br>" + methodAnalysis(incArr);

  expA.innerHTML =
    "Разход: "+Object.values(expG).reduce((a,b)=>a+Math.abs(b),0).toFixed(2)+" €<br>" +
    "<b>Методи:</b><br>" + methodAnalysis(expArr);

}

</script>

<!-- 🔹 UI за профили -->
<div>
<button onclick="switchProfile('личен')">👤 Личен</button>
<button onclick="switchProfile('служебен')">🏢 Служебен</button>
</div>
