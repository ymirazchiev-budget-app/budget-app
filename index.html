<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
input, button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h2>💰 Budget Cloud</h2>

<div id="loginSection">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
<h1 id="balance">0 €</h1>

<button onclick="add('income')">+ Доход</button>
<button onclick="add('expense')">- Разход</button>

<div id="list"></div>
</div>

<script>
const client = supabase.createClient(
"https://ipihscvyyxetkiajjllg.supabase.co",
"sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user = null;

// автоматично влизане ако вече има сесия
window.onload = async () => {
  const { data } = await client.auth.getSession();

  if(data.session){
    user = data.session.user;
    showApp();
    load();
  }
};

function showApp(){
  document.getElementById("loginSection").style.display="none";
  document.getElementById("app").style.display="block";
}

// LOGIN (работещ 100%)
async function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(!email || !pass){
    alert("Въведи email и парола");
    return;
  }

  // пробва вход
  let { data, error } = await client.auth.signInWithPassword({
    email: email,
    password: pass
  });

  // ако няма акаунт → създава
  if(error){
    let res = await client.auth.signUp({
      email: email,
      password: pass
    });

    if(res.error){
      alert("Грешка: " + res.error.message);
      return;
    }

    alert("Акаунт създаден! Натисни Login пак.");
    return;
  }

  user = data.user;
  showApp();
  load();
}

// зареждане
async function load(){
  let { data } = await client
    .from("transactions")
    .select("*")
    .eq("user_id", user.id);

  render(data || []);
}

// визуализация
function render(data){
  let bal = 0;
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(d=>{
    let amount = Number(d.amount);
    bal += amount;

    let div = document.createElement("div");
    div.innerText = d.name + " " + amount.toFixed(2) + " €";

    let btn = document.createElement("button");
    btn.innerText = "❌";
    btn.onclick = ()=>del(d.id);

    div.appendChild(btn);
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";
}

// добавяне
async function add(type){
  let name = prompt("Категория:");
  let val = parseFloat(prompt("Сума:").replace(",", "."));

  if(isNaN(val)) return;

  if(type==="expense") val = -val;

  await client.from("transactions").insert({
    user_id: user.id,
    profile: "Лични",
    name: name || type,
    amount: val,
    type: type
  });

  load();
}

// триене
async function del(id){
  await client.from("transactions").delete().eq("id", id);
  load();
}
</script>

</body>
</html>
