<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Cloud FINAL MAX++</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; margin:0; padding:0; }
input, button, select { padding:8px; margin:5px; border-radius:6px; border:none; }
.card { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }
</style>
</head>
<body>

<h2>💰 Budget Cloud FINAL MAX++</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Баланс: <span id="balance">0 €</span></h3>

  <select id="monthFilter" onchange="load()">
    <option value="">Всички месеци</option>
  </select>

  <button onclick="add('income')">+ Доход</button>
  <button onclick="add('expense')">- Разход</button>

  <div id="list"></div>

  <div class="card">
    <canvas id="categoryChart"></canvas>
  </div>

  <div class="card">
    <canvas id="monthlyChart"></canvas>
  </div>

  <div id="analysis"></div>
</div>

<script>
const client = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;
let categoryChart, monthlyChart;

window.onload = async () => {
  const { data } = await client.auth.getSession();
  if(data.session){
    user = data.session.user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load();
  }
};

async function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  let { data, error } = await client.auth.signInWithPassword({ email, password: pass });
  if(error){ alert("Login грешка: " + error.message); return; }
  user = data.user;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

async function load(){
  let query = client.from("transactions").select("*").eq("user_id", user.id);
  const month = document.getElementById("monthFilter").value;
  if(month){
    query = query.gte('date', month+"-01").lt('date', month+"-32");
  }
  const { data } = await query;
  render(data || []);
  fillMonths(data || []);
}

function fillMonths(data){
  const sel = document.getElementById("monthFilter");
  const months = [...new Set(data.map(d=>d.date.slice(0,7)))];
  sel.innerHTML = '<option value="">Всички месеци</option>';
  months.forEach(m => {
    const o = document.createElement("option");
    o.value = m; o.innerText = m;
    sel.appendChild(o);
  });
}

function render(data){
  let bal=0, categories={}, monthly={};
  const list = document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    let amount = parseFloat(d.amount.toFixed(2));
    bal += amount;

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`${d.name} ${amount.toFixed(2)} € <button onclick="del(${i})">❌</button>`;
    list.appendChild(div);

    // categories
    if(amount < 0){
      const cat = d.name.toLowerCase();
      categories[cat] = (categories[cat]||0) + Math.abs(amount);
    }

    // monthly sums
    const m = d.date.slice(0,7);
    if(!monthly[m]) monthly[m]={inc:0, exp:0};
    if(amount>0) monthly[m].inc += amount;
    else monthly[m].exp += Math.abs(amount);
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";

  // 📊 category chart
  const ctx = document.getElementById("categoryChart");
  if(categoryChart) categoryChart.destroy();
  categoryChart = new Chart(ctx,{ type:'doughnut', data:{
    labels: Object.keys(categories),
    datasets:[{ data:Object.values(categories), backgroundColor:['#22c55e','#ef4444','#3b82f6','#f59e0b','#8b5cf6','#ec4899'] }]
  }});

  // 📈 monthly chart
  const ctx2 = document.getElementById("monthlyChart");
  if(monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(ctx2,{ type:'line', data:{
    labels: Object.keys(monthly).sort(),
    datasets:[
      { label:'Доход', data:Object.keys(monthly).sort().map(k=>monthly[k].inc), borderColor:'#22c55e', fill:false },
      { label:'Разход', data:Object.keys(monthly).sort().map(k=>monthly[k].exp), borderColor:'#ef4444', fill:false }
    ]
  }});

  // top category
  let max = 0, topCat="";
  for(let c in categories){ if(categories[c]>max){max=categories[c]; topCat=c;} }
  const analysisDiv = document.getElementById("analysis");
  analysisDiv.innerHTML = topCat ? `<h3>🥇 Най-много харчиш за: ${topCat} (${max.toFixed(2)} €)</h3>` : "";
}

async function add(type){
  const name = prompt("Категория:");
  let val = parseFloat(prompt("Сума:"));
  if(isNaN(val)) return;
  if(type==="expense") val = -val;

  await client.from("transactions").insert({
    user_id:user.id,
    profile:"Лични",
    name:name || type,
    amount:parseFloat(val.toFixed(2)),
    date: new Date().toISOString()
  });

  load();
}

async function del(index){
  const { data } = await client.from("transactions").select("*").eq("user_id", user.id);
  const t = data[index];
  if(!t) return;
  await client.from("transactions").delete().eq("id", t.id);
  load();
}
</script>
</body>
</html>
