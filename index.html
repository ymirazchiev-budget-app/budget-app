<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
button,input,select { padding:10px; margin:5px; border-radius:8px; }
.card { background:#1e293b; padding:10px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<h2>💰 Budget MAX</h2>

<div id="login">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<select id="profile" onchange="switchProfile()"></select>
<button onclick="addProfile()">+ Профил</button>

<select id="month" onchange="load()"></select>

<h1 id="balance">0 €</h1>
<div id="bonus">💎 Бонус: 0 €</div>

<button onclick="add('income')">+ Доход</button>
<button onclick="add('expense')">- Разход</button>
<button onclick="add('bonus')">🎁 Бонус</button>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card" id="analysis"></div>

<div id="list"></div>

</div>

<script>
const db = supabase.createClient(
"https://ipihscvyyxetkiajjllg.supabase.co",
"sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user, profiles=[], currentProfile, chart;

// AUTO LOGIN
window.onload = async () => {
  let { data } = await db.auth.getSession();
  if(data.session){
    user = data.session.user;
    start();
  }
};

// LOGIN
async function login(){
  let email=emailEl.value, pass=passEl.value;

  let { data, error } = await db.auth.signInWithPassword({ email, password:pass });

  if(error){
    let r = await db.auth.signUp({ email, password:pass });
    alert("Създаден акаунт → натисни Login пак");
    return;
  }

  user = data.user;
  start();
}

function start(){
  loginDiv.style.display="none";
  app.style.display="block";
  initMonths();
  loadProfiles();
}

// ПРОФИЛИ
async function loadProfiles(){
  let { data } = await db.from("transactions")
    .select("profile")
    .eq("user_id", user.id);

  let unique = [...new Set(data.map(d=>d.profile||"Лични"))];

  profiles = unique.length ? unique : ["Лични"];
  currentProfile = profiles[0];

  let sel=profile;
  sel.innerHTML="";
  profiles.forEach(p=>{
    let o=document.createElement("option");
    o.value=p;
    o.innerText=p;
    sel.appendChild(o);
  });

  load();
}

function addProfile(){
  let p=prompt("Име:");
  if(!p) return;
  profiles.push(p);
  currentProfile=p;
  loadProfiles();
}

function switchProfile(){
  currentProfile=profile.value;
  load();
}

// МЕСЕЦИ
function initMonths(){
  let now=new Date();
  for(let i=0;i<12;i++){
    let d=new Date(now.getFullYear(),now.getMonth()-i,1);
    let val=d.toISOString().slice(0,7);
    let o=document.createElement("option");
    o.value=val;
    o.innerText=d.toLocaleString("bg",{month:"long",year:"numeric"});
    month.appendChild(o);
  }
}

// LOAD DATA
async function load(){
  let m=month.value;

  let { data } = await db.from("transactions")
    .select("*")
    .eq("user_id", user.id);

  let filtered = data.filter(d=>{
    if(currentProfile && d.profile!==currentProfile) return false;
    if(m){
      let dt=new Date(d.created_at);
      return dt.toISOString().slice(0,7)===m;
    }
    return true;
  });

  render(filtered);
}

// RENDER
function render(data){
  let bal=0, bonusSum=0, inc=0, exp=0, cats={};
  list.innerHTML="";

  data.forEach(d=>{
    let a=Number(d.amount);

    if(d.type==="bonus") bonusSum+=a;
    else{
      bal+=a;
      if(a>0) inc+=a;
      else{
        exp+=Math.abs(a);
        cats[d.name]=(cats[d.name]||0)+Math.abs(a);
      }
    }

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      ${d.name} ${a.toFixed(2)} €
      <button onclick="del('${d.id}')">❌</button>
    `;
    list.appendChild(div);
  });

  balance.innerText=bal.toFixed(2)+" €";
  bonus.innerText="💎 Бонус: "+bonusSum.toFixed(2)+" €";

  // анализ
  analysis.innerHTML="<h3>📊 Разходи:</h3>";
  let top="",max=0;
  for(let c in cats){
    analysis.innerHTML+=c+": "+cats[c].toFixed(2)+" €<br>";
    if(cats[c]>max){max=cats[c];top=c;}
  }
  if(top) analysis.innerHTML+="<br><b>Топ: "+top+"</b>";

  draw(inc,exp);
}

// CHART
function draw(inc,exp){
  if(chart) chart.destroy();

  chart=new Chart(chartEl,{
    type:"line",
    data:{
      labels:["Доход","Разход"],
      datasets:[{
        data:[inc,exp],
        borderColor:"#38bdf8"
      }]
    }
  });
}

// ADD
async function add(type){
  let name=prompt("Категория:");
  let val=parseFloat(prompt("Сума:").replace(",","."));
  if(isNaN(val)) return;

  if(type==="expense") val=-val;

  await db.from("transactions").insert({
    user_id:user.id,
    profile:currentProfile,
    name:name||type,
    amount:val,
    type:type
  });

  load();
}

// DELETE
async function del(id){
  await db.from("transactions").delete().eq("id",id);
  load();
}

// SHORTCUTS
let emailEl=document.getElementById("email");
let passEl=document.getElementById("pass");
let loginDiv=document.getElementById("login");
let chartEl=document.getElementById("chart");
</script>

</body>
</html>
