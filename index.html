<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_REAL_STABLE_v7</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }

button { padding:6px; margin:3px; border:none; border-radius:5px; cursor:pointer; }

.container {
  display:flex;
  justify-content:center;
  gap:10px;
}

.col { width:45%; }

.card {
  background:#1e293b;
  margin:2px;
  padding:4px;
  border-radius:5px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
}

.balance { font-size:22px; margin:10px; }

.analysis { background:#020617; padding:10px; margin:10px; border-radius:10px; }

</style>
</head>

<body>

<h3>💰 BudgetCloud_REAL_STABLE_v7</h3>

<div class="balance" id="balance">0.00 €</div>

<button onclick="flow('income')">+ Доход</button>
<button onclick="flow('expense')">- Разход</button>
<button onclick="flow('bonus')">💎 Бонус</button>
<button onclick="window.print()">🖨️ Печат</button>

<div class="container">
  <div class="col">
    <h4>Доходи / Бонуси</h4>
    <div id="incomeList"></div>
  </div>

  <div class="col">
    <h4>Разходи</h4>
    <div id="expenseList"></div>
  </div>
</div>

<div class="analysis">
  <b>📊 Разходи по категории</b>
  <div id="analysis"></div>
  <canvas id="chart"></canvas>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");
let chart;

// FLOW (НЕ ПИПАМ ОСНОВАТА)
function flow(type){

  let options = [];

  if(type==="expense"){
    options = ["храна","пазар","ток","вода"];
  }

  if(type==="income"){
    options = ["заплата","помощи"];
  }

  if(type==="bonus"){
    options = ["заплата","подарък","клиент"];
  }

  let name = prompt("Избери или напиши:\n" + options.join(", "));
  if(!name) return;

  let method = prompt("Къде?");
  if(!method) method="-";

  let val = parseFloat(prompt("Колко?").replace(",", "."));
  if(isNaN(val)) return;

  if(type==="expense") val = -Math.abs(val);

  data.push({
    id: Date.now(),
    name,
    amount: val,
    method,
    type
  });

  localStorage.setItem("data", JSON.stringify(data));

  render();
}

// RENDER (СТАБИЛЕН)
function render(){

  let incomeDiv = document.getElementById("incomeList");
  let expenseDiv = document.getElementById("expenseList");

  incomeDiv.innerHTML="";
  expenseDiv.innerHTML="";

  let bal=0;
  let cats={};

  data.forEach(t=>{

    let a = Number(t.amount);
    bal += a;

    if(a<0){
      if(!cats[t.name]) cats[t.name]=0;
      cats[t.name]+=Math.abs(a);
    }

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <span>${t.name} (${t.method})</span>
      <span>${a.toFixed(2)} €</span>
    `;

    if(a>=0){
      incomeDiv.appendChild(div);
    } else {
      expenseDiv.appendChild(div);
    }

  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";

  // анализ
  let aDiv=document.getElementById("analysis");
  aDiv.innerHTML="";

  let labels=[], values=[];

  for(let c in cats){
    labels.push(c);
    values.push(cats[c]);

    let p=document.createElement("div");
    p.innerText = c + ": " + cats[c].toFixed(2)+" €";
    aDiv.appendChild(p);
  }

  draw(labels, values);
}

// GRAPH
function draw(labels, values){
  const ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:"#ef4444"
      }]
    }
  });
}

// START
render();

</script>

</body>
</html>
