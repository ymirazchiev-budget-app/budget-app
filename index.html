<!DOCTYPE html>
<html lang="bg">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }
.header { padding:20px; }
.balance { font-size:32px; }
.card { background:#1e293b; margin:10px; padding:15px; border-radius:12px; }
button, select { padding:10px; margin:5px; border:none; border-radius:8px; }
.green { color:#22c55e; }
.red { color:#ef4444; }
</style>
</head>

<body>

<div id="login" class="card">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="header">
<div class="balance" id="balance">0 €</div>
<div>💎 Бонус: <span id="bonus">0 €</span></div>

<select id="profile" onchange="switchProfile()"></select>
<button onclick="addProfile()">+ Профил</button>

<br>

<select id="monthSelect" onchange="load()"></select>

</div>

<div class="card" id="monthly"></div>

<button onclick="add('income')">+ Доход</button>
<button onclick="add('expense')">- Разход</button>
<button onclick="add('bonus')">🎁 Бонус</button>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

</div>

<script>
const client = supabase.createClient(
"https://ipihscvyyxetkiajjllg.supabase.co",
"sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user, chart;

// 👤 профили
let profiles = JSON.parse(localStorage.getItem("profiles"));
if(!profiles){
  profiles=["Лични"];
  localStorage.setItem("profiles", JSON.stringify(profiles));
}
let currentProfile = localStorage.getItem("profile") || "Лични";

// 📅 месец
let selectedMonth = new Date().getMonth();
let selectedYear = new Date().getFullYear();

window.onload = async ()=>{
  const { data } = await client.auth.getSession();
  if(data.session){
    user = data.session.user;
    start();
  }
};

async function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  let { data, error } = await client.auth.signInWithPassword({email,password:pass});
  if(error){ alert(error.message); return; }

  user = data.user;
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  loadProfiles();
  loadMonths();
  load();
}

// 👤 профили
function loadProfiles(){
  let sel=document.getElementById("profile");
  sel.innerHTML="";
  profiles = JSON.parse(localStorage.getItem("profiles")) || ["Лични"];

  profiles.forEach(p=>{
    let o=document.createElement("option");
    o.value=p;
    o.innerText=p;
    sel.appendChild(o);
  });

  sel.value=currentProfile;
}

function switchProfile(){
  currentProfile=document.getElementById("profile").value;
  localStorage.setItem("profile", currentProfile);
  load();
}

function addProfile(){
  let name=prompt("Име:");
  if(!name) return;

  if(!profiles.includes(name)) profiles.push(name);

  localStorage.setItem("profiles", JSON.stringify(profiles));
  currentProfile=name;
  localStorage.setItem("profile", name);

  loadProfiles();
  load();
}

// 📅 месец dropdown
function loadMonths(){
  let sel=document.getElementById("monthSelect");
  sel.innerHTML="";

  for(let i=0;i<12;i++){
    let o=document.createElement("option");
    o.value=i;
    o.innerText=new Date(0,i).toLocaleString('bg-BG',{month:'long'});
    sel.appendChild(o);
  }

  sel.value=selectedMonth;
}

function loadMonthValue(){
  selectedMonth=parseInt(document.getElementById("monthSelect").value);
}

// 🧠 авто категории
function autoCategory(name){
  name=name.toLowerCase();

  if(name.includes("храна")) return "🍔 Храна";
  if(name.includes("ток") || name.includes("вода")) return "💡 Сметки";
  if(name.includes("телефон")) return "📱 Телефон";
  if(name.includes("гориво")) return "⛽ Транспорт";

  return name;
}

// 📥 load
async function load(){
  loadMonthValue();

  let { data } = await client
    .from("transactions")
    .select("*")
    .eq("user_id", user.id)
    .eq("profile", currentProfile);

  render(data||[]);
}

// 🎯 render
function render(data){
  let bal=0, bonus=0, inc=0, exp=0;
  let list=document.getElementById("list");
  list.innerHTML="";

  let mInc=0, mExp=0;
  let categories={};
  let monthlyTrend={};

  data.forEach(d=>{
    let amount=Number(d.amount);
    let date=new Date(d.created_at);

    // 💎 бонус
    if(d.name==="bonus"){
      bonus+=amount;
      inc+=amount;
      bal+=amount;
    } else {
      bal+=amount;
      if(amount>0) inc+=amount;
      else{
        exp+=Math.abs(amount);
        categories[d.name]=(categories[d.name]||0)+Math.abs(amount);
      }
    }

    // 📅 месец filter
    if(date.getMonth()===selectedMonth && date.getFullYear()===selectedYear){
      if(amount>0) mInc+=amount;
      else mExp+=Math.abs(amount);
    }

    // 📈 тренд
    let key=date.getFullYear()+"-"+(date.getMonth()+1);
    monthlyTrend[key]=(monthlyTrend[key]||0)+amount;

    // UI
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      ${d.name}
      <b class="${amount<0?'red':'green'}">${amount.toFixed(2)} €</b>
      <button onclick="del('${d.id}')">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText=bal.toFixed(2)+" €";
  document.getElementById("bonus").innerText=bonus.toFixed(2)+" €";

  let html=`
    <h3>📊 ${new Date(0,selectedMonth).toLocaleString('bg-BG',{month:'long'})}</h3>
    Доход: ${mInc.toFixed(2)} € <br>
    Разход: ${mExp.toFixed(2)} € <br>
    Баланс: ${(mInc-mExp).toFixed(2)} €
    <hr>
    <h3>Категории</h3>
  `;

  for(let c in categories){
    html+=c+": "+categories[c].toFixed(2)+" €<br>";
  }

  document.getElementById("monthly").innerHTML=html;

  drawChart(monthlyTrend);
}

// 📈 линия
function drawChart(data){
  let ctx=document.getElementById("chart");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels:Object.keys(data),
      datasets:[{
        label:'Баланс',
        data:Object.values(data),
        borderColor:'#22c55e',
        backgroundColor:'#22c55533'
      }]
    }
  });
}

// ➕ add
async function add(type){
  let name=prompt("Категория:");
  let val=prompt("Сума:");

  val=parseFloat(val.replace(",","."));
  if(isNaN(val)) return;

  if(type==="expense") val=-val;
  if(type==="bonus") name="bonus";

  name=autoCategory(name||type);

  await client.from("transactions").insert({
    user_id:user.id,
    profile:currentProfile,
    name:name,
    amount:val,
    created_at:new Date().toISOString()
  });

  load();
}

// ❌ delete
async function del(id){
  await client.from("transactions").delete().eq("id", id);
  load();
}
</script>

</body>
</html>
