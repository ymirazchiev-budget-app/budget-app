<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_REAL_FIXED_v5</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }

button {
  padding:6px 8px;
  margin:2px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:13px;
}

.card {
  background:#1e293b;
  margin:3px;
  padding:4px;
  border-radius:5px;
  font-size:12px;
  line-height:1.2;
}

.balance { font-size:24px; margin:8px; }

.analysis {
  background:#020617;
  padding:8px;
  margin:8px;
  border-radius:8px;
  font-size:13px;
}

select {
  padding:4px;
  font-size:13px;
}

@media print {
  body { background:white; color:black; }
  button, select { display:none; }
}
</style>
</head>

<body>

<h3>💰 BudgetCloud_REAL_FIXED_v5</h3>

<div class="balance" id="balance">0.00 €</div>

<select id="profileFilter" onchange="render()">
  <option value="all">Всички</option>
  <option value="лични">Лични</option>
  <option value="служебен">Служебен</option>
</select>

<br>

<button onclick="addIncome()">+ Доход</button>
<button onclick="addExpense()">- Разход</button>
<button onclick="addBonus()">💎 Бонус</button>
<button onclick="window.print()">🖨️ Печат</button>

<div id="list"></div>

<div class="analysis">
  <b>📊 Разходи по категории</b>
  <div id="analysis"></div>
  <canvas id="chart"></canvas>
</div>

<script>
let transactions = [];
let chart;

// категории
function autoCategory(name){
  let n = name.toLowerCase();
  if(n.includes("пица") || n.includes("храна")) return "храна";
  if(n.includes("ток")) return "ток";
  if(n.includes("пазар")) return "пазар";
  return name;
}

// профил
function askProfile(){
  let p = prompt("Профил: лични или служебен?");
  if(!p) return "лични";
  return p.toLowerCase().includes("служ") ? "служебен" : "лични";
}

// ➕ ДОХОД
function addIncome(){
  let name = prompt("Доход от?");
  if(!name) return;

  let profile = askProfile();

  let val = parseFloat(prompt("Сума:").replace(",", "."));
  if(isNaN(val)) return;

  addTransaction(name, val, profile);
}

// ➖ РАЗХОД
function addExpense(){
  let name = prompt("Разход за?");
  if(!name) return;

  name = autoCategory(name);

  let profile = askProfile();

  let val = -Math.abs(parseFloat(prompt("Сума:").replace(",", ".")));
  if(isNaN(val)) return;

  addTransaction(name, val, profile);
}

// 💎 БОНУС (ВЪРНАТ както беше)
function addBonus(){
  let val = parseFloat(prompt("Бонус:").replace(",", "."));
  if(isNaN(val)) return;

  let profile = askProfile();

  addTransaction("бонус", val, profile);
}

// запис
function addTransaction(name, amount, profile){
  transactions.push({
    id: Date.now(),
    name,
    amount,
    profile
  });

  render();
}

// delete
function del(id){
  transactions = transactions.filter(t => t.id !== id);
  render();
}

// render
function render(){
  let bal=0;
  let cats={};

  const filter = document.getElementById("profileFilter").value;

  const list = document.getElementById("list");
  list.innerHTML="";

  transactions.forEach(t=>{

    if(filter !== "all" && t.profile !== filter) return;

    bal += t.amount;

    if(t.amount < 0){
      if(!cats[t.name]) cats[t.name]=0;
      cats[t.name]+=Math.abs(t.amount);
    }

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${t.name} | ${t.profile} | ${t.amount.toFixed(2)} €
      <button onclick="del(${t.id})">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";

  // анализ
  const aDiv = document.getElementById("analysis");
  aDiv.innerHTML="";

  let labels=[], values=[];

  for(let c in cats){
    labels.push(c);
    values.push(cats[c]);

    let p=document.createElement("div");
    p.innerText = c + ": " + cats[c].toFixed(2)+" €";
    aDiv.appendChild(p);
  }

  draw(labels, values);
}

// графика
function draw(labels, values){
  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        data:values,
        backgroundColor:"#ef4444"
      }]
    }
  });
}
</script>

</body>
</html>
