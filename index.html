<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_REAL_FIXED_v3</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.card { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }
.balance { font-size:28px; margin:10px; }
.analysis { background:#020617; padding:10px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<h2>💰 BudgetCloud_REAL_FIXED_v3</h2>

<div class="balance" id="balance">0.00 €</div>

<button onclick="addIncome()">+ Доход</button>
<button onclick="addExpense()">- Разход</button>
<button onclick="addBonus()">💎 Бонус</button>

<div id="list"></div>

<div class="analysis">
  <h3>📊 Разходи по категории</h3>
  <div id="analysis"></div>
</div>

<script>
let transactions = [];
let supabaseClient = null;
let user = null;

window.onload = async function(){
  try{
    if(window.supabase){
      supabaseClient = window.supabase.createClient(
        "https://ipihscvyyxetkiajjllg.supabase.co",
        "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
      );

      const { data } = await supabaseClient.auth.getSession();
      if(data.session){
        user = data.session.user;
      }
    }
  }catch(e){}

  render();
};

// 🔥 автоматични категории
function autoCategory(name){
  let n = name.toLowerCase();

  if(n.includes("пица") || n.includes("храна")) return "храна";
  if(n.includes("ток")) return "ток";
  if(n.includes("вода")) return "вода";
  if(n.includes("гориво") || n.includes("бензин")) return "гориво";

  return name;
}

// ➕ ДОХОД
async function addIncome(){
  let name = prompt("От къде е дохода?");
  if(!name) return;

  let source = prompt("Източник?");
  if(!source) source = "-";

  let val = prompt("Сума:");
  if(!val) return;

  val = parseFloat(val.replace(",", "."));

  addTransaction(name, val, source);
}

// ➖ РАЗХОД
async function addExpense(){
  let name = prompt("За какво е?");
  if(!name) return;

  name = autoCategory(name);

  let source = prompt("Платено от?");
  if(!source) source = "-";

  let val = prompt("Сума:");
  if(!val) return;

  val = -Math.abs(parseFloat(val.replace(",", ".")));

  addTransaction(name, val, source);
}

// 💎 БОНУС
async function addBonus(){
  let name = prompt("Бонус?");
  if(!name) name="бонус";

  let source = prompt("От къде?");
  if(!source) source="-";

  let val = prompt("Сума:");
  if(!val) return;

  val = parseFloat(val.replace(",", "."));

  addTransaction(name, val, source);
}

// ➕ запис
async function addTransaction(name, amount, source){

  const t = {
    id: Date.now(),
    name,
    amount,
    source
  };

  transactions.push(t);

  if(supabaseClient && user){
    try{
      await supabaseClient.from("transactions").insert({
        user_id: user.id,
        name,
        amount,
        source,
        created_at: new Date()
      });
    }catch(e){}
  }

  render();
}

// ❌ delete
function del(id){
  transactions = transactions.filter(t => t.id !== id);
  render();
}

// 🎨 render
function render(){
  let bal = 0;
  let categories = {};

  const list = document.getElementById("list");
  list.innerHTML="";

  transactions.forEach(t=>{
    bal += t.amount;

    // анализ (само разходи)
    if(t.amount < 0){
      if(!categories[t.name]) categories[t.name]=0;
      categories[t.name]+=Math.abs(t.amount);
    }

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <b>${t.name}</b> (${t.source})<br>
      ${t.amount.toFixed(2)} €
      <button onclick="del(${t.id})">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";

  // 📊 анализ
  const aDiv = document.getElementById("analysis");
  aDiv.innerHTML="";

  let max = 0;
  let top = "";

  for(let c in categories){
    let val = categories[c];

    let p = document.createElement("div");
    p.innerText = c + ": " + val.toFixed(2) + " €";
    aDiv.appendChild(p);

    if(val > max){
      max = val;
      top = c;
    }
  }

  if(top){
    let best = document.createElement("div");
    best.innerHTML = "<br><b>Най-много харчиш за: " + top + " (" + max.toFixed(2) + " €)</b>";
    aDiv.appendChild(best);
  }
}
</script>

</body>
</html>
