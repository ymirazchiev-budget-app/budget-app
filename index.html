<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.section { margin:10px 0; }
.row { display:flex; gap:10px; justify-content:center; }
.col { width:45%; }
canvas { width:45% !important; height:150px !important; }
.small { font-size:12px; }
button { padding:5px; margin:2px; }
</style>
</head>
<body>

<h2>💰 BudgetCloud_FIX_v5</h2>
<h1 id="balance">0 €</h1>

<div class="section">
<button onclick="add('income')">Доход</button>
<button onclick="add('bonus')">Бонус</button>
<button onclick="add('expense')">Разход</button>
<button onclick="window.print()">🖨</button>
</div>

<div class="row">

<div class="col">
<h3>Доход + Бонус</h3>
<div id="incGroup"></div>
<div id="inc"></div>
<div id="incA"></div>
</div>

<div class="col">
<h3>Разход</h3>
<div id="expGroup"></div>
<div id="exp"></div>
<div id="expA"></div>
</div>

</div>

<div class="row">
<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
</div>

<select id="month" onchange="load()">
<option value="all">Всички</option>
<option value="4">4</option>
</select>

<div id="daily" class="small"></div>

<script>

const db = supabase.createClient(
"https://ipihscvyyxetkiajjllg.supabase.co",
"sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let chart1, chart2;

function autoCategory(text){
  text = text.toLowerCase();

  if(text.includes("kaufland") || text.includes("billa")) return "храна";
  return text;
}

async function add(type){
  let category = prompt("Какво?");
  let method = prompt("Къде?");
  let amount = prompt("Сума");

  if(!category || !amount) return;

  amount = Number(amount);

  if(type==="expense") amount = -Math.abs(amount);

  category = autoCategory(category);

  await db.from("transactions").insert([{ type, category, method, amount }]);
  load();
}

async function del(id){
  await db.from("transactions").delete().eq("id", id);
  load();
}

async function load(){
  const { data } = await db.from("transactions").select("*");
  render(data || []);
}

function group(arr){
  let map={};
  arr.forEach(t=>{
    map[t.category]=(map[t.category]||0)+t.amount;
  });
  return map;
}

function render(data){

  let incArr = data.filter(t=>t.type==="income"||t.type==="bonus");
  let expArr = data.filter(t=>t.type==="expense");

  let incG = group(incArr);
  let expG = group(expArr);

  // групирани
  incGroup.innerHTML = Object.entries(incG)
    .map(([k,v])=>`${k}: ${v} €`).join("<br>");

  expGroup.innerHTML = Object.entries(expG)
    .map(([k,v])=>`${k}: ${Math.abs(v)} €`).join("<br>");

  // РЕДОВЕ (вече НЕ се трият)
  inc.innerHTML = incArr.map(t=>
    `<div class="small">${t.category} (${t.method}) ${t.amount}€
    <button onclick="del('${t.id}')">X</button></div>`
  ).join("");

  exp.innerHTML = expArr.map(t=>
    `<div class="small">${t.category} (${t.method}) ${t.amount}€
    <button onclick="del('${t.id}')">X</button></div>`
  ).join("");

  let incSum = Object.values(incG).reduce((a,b)=>a+b,0);
  let expSum = Object.values(expG).reduce((a,b)=>a+Math.abs(b),0);

  incA.innerHTML = "Общо: "+incSum+" €";
  expA.innerHTML = "Общо: "+expSum+" €";

  balance.innerText = (incSum-expSum)+" €";

  // графики FIX (на един ред)
  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();

  chart1 = new Chart(c1,{
    type:"bar",
    data:{labels:Object.keys(incG),datasets:[{data:Object.values(incG),backgroundColor:"green"}]},
    options:{plugins:{legend:{display:false}}}
  });

  chart2 = new Chart(c2,{
    type:"bar",
    data:{labels:Object.keys(expG),datasets:[{data:Object.values(expG).map(v=>Math.abs(v)),backgroundColor:"red"}]},
    options:{plugins:{legend:{display:false}}}
  });

}

load();

</script>
</body>
</html>
