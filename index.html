<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_FIXED_COLUMNS_v6</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }

button { padding:6px; margin:3px; border:none; border-radius:5px; cursor:pointer; font-size:13px; }

.container {
  display:flex;
  justify-content:center;
  gap:10px;
}

.col {
  width:45%;
}

.card {
  background:#1e293b;
  margin:2px;
  padding:4px;
  border-radius:5px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
}

.balance { font-size:22px; margin:10px; }

select { padding:5px; margin:5px; }

</style>
</head>

<body>

<h3>💰 BudgetCloud_FIXED_COLUMNS_v6</h3>

<div class="balance" id="balance">0.00 €</div>

<select id="monthFilter"></select>

<br>

<button onclick="flow('income')">+ Доход</button>
<button onclick="flow('expense')">- Разход</button>
<button onclick="flow('bonus')">💎 Бонус</button>

<div class="container">
  <div class="col">
    <h4>Доходи / Бонуси</h4>
    <div id="incomeList"></div>
  </div>

  <div class="col">
    <h4>Разходи</h4>
    <div id="expenseList"></div>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");

// FLOW
function flow(type){

  let options = [];

  if(type==="expense"){
    options = ["храна","пазар","ток","вода"];
  }

  if(type==="income"){
    options = ["заплата","помощи"];
  }

  if(type==="bonus"){
    options = ["заплата","подарък","клиент"];
  }

  let name = prompt("Избери или напиши:\n" + options.join(", "));
  if(!name) return;

  let method = prompt("Къде?");
  if(!method) method="-";

  let val = parseFloat(prompt("Колко?").replace(",", "."));
  if(isNaN(val)) return;

  if(type==="expense") val = -Math.abs(val);

  data.push({
    id: Date.now(),
    name,
    amount: val,
    method,
    date: new Date().toISOString(),
    type
  });

  localStorage.setItem("data", JSON.stringify(data));

  render();
}

// MONTHS
function initMonths(){
  let sel = document.getElementById("monthFilter");

  let months = [...new Set(data.map(d => d.date.slice(0,7)))];

  if(months.length === 0){
    let now = new Date().toISOString().slice(0,7);
    months = [now];
  }

  sel.innerHTML="";

  months.sort().reverse().forEach(m=>{
    let opt=document.createElement("option");
    opt.value=m;
    opt.textContent=m;
    sel.appendChild(opt);
  });

  sel.onchange = render;
}

// RENDER
function render(){

  initMonths();

  let selected = document.getElementById("monthFilter").value;

  let filtered = data.filter(d => d.date.startsWith(selected));

  let incomeDiv = document.getElementById("incomeList");
  let expenseDiv = document.getElementById("expenseList");

  incomeDiv.innerHTML="";
  expenseDiv.innerHTML="";

  let bal = 0;

  filtered.forEach(t=>{
    let a = Number(t.amount);
    bal += a;

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <span>${t.name} (${t.method})</span>
      <span>${a.toFixed(2)} €</span>
    `;

    if(a >= 0){
      incomeDiv.appendChild(div);
    } else {
      expenseDiv.appendChild(div);
    }
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";
}

// START
render();

</script>

</body>
</html>
