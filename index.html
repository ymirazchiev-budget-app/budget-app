<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Budget Cloud</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
  /* Основен стил */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h2 {
    margin: 1rem 0;
  }

  input {
    padding: 10px;
    margin: 0.3rem;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
    width: 200px;
  }

  button {
    padding: 10px 15px;
    margin: 0.5rem 0.3rem;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    background-color: #2563eb;
    color: white;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #1e40af;
  }

  select {
    padding: 8px 10px;
    margin: 0.5rem 0.3rem;
    border-radius: 6px;
    font-size: 1rem;
  }

  #app {
    width: 95%;
    max-width: 600px;
    margin-top: 1rem;
  }

  #balance {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  #bonusBalance {
    font-size: 1.25rem;
    margin-bottom: 1rem;
    color: #38bdf8;
    font-weight: bold;
  }

  #list {
    margin: 1rem 0;
    max-height: 300px;
    overflow-y: auto;
  }

  .item {
    background: #1e293b;
    padding: 12px;
    margin: 0.3rem 0;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .item-name {
    font-weight: 600;
  }

  .item-amount {
    font-weight: 700;
  }

  .item.expense .item-amount {
    color: #ef4444;
  }

  .item.income .item-amount {
    color: #22c55e;
  }

  .item.bonus .item-amount {
    color: #facc15;
  }

  .delete-btn {
    background: transparent;
    border: none;
    color: #f87171;
    font-size: 1.25rem;
    cursor: pointer;
  }

  #analysis {
    margin-top: 1rem;
    background: #1e293b;
    padding: 1rem;
    border-radius: 8px;
  }

  #analysis h3 {
    margin-bottom: 0.7rem;
  }

  canvas {
    max-width: 100%;
    margin-top: 1rem;
  }

  /* Responsive */
  @media (max-width: 600px) {
    #app {
      width: 100%;
    }
    input {
      width: 90%;
    }
  }
</style>

</head>
<body>

<h2>💰 Budget Cloud</h2>

<div id="loginSection">
  <input id="email" type="email" placeholder="Email" autocomplete="username" />
  <input id="pass" type="password" placeholder="Парола" autocomplete="current-password" />
  <br/>
  <button onclick="login()">Вход</button>
</div>

<div id="app" style="display:none;">
  <div id="balance">0 €</div>
  <div id="bonusBalance">💎 Бонус: 0.00 €</div>

  <div>
    <select id="profileSelect" onchange="switchProfile()"></select>
    <button onclick="addProfile()">+ Профил</button>
  </div>

  <div>
    <select id="monthSelect" onchange="switchMonth()"></select>
  </div>

  <div style="margin: 10px 0;">
    <button onclick="add('income')">+ Доход</button>
    <button onclick="add('expense')">- Разход</button>
    <button onclick="add('bonus')">🎁 Бонус</button>
  </div>

  <div id="list"></div>

  <div id="analysis">
    <h3>📊 Разходи по категории:</h3>
  </div>

  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Supabase client
  const supabase = supabase.createClient(
    "https://ipihscvyyxetkiajjllg.supabase.co",
    "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
  );

  let user = null;
  let profiles = [];
  let currentProfile = null;
  let currentMonth = null; // string: "YYYY-MM"

  // Initialize on load
  window.onload = async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session) {
      user = data.session.user;
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("app").style.display = "block";

      await loadProfiles();
      initMonths();
      await loadData();
    } else {
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("app").style.display = "none";
    }
  };

  async function login() {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value.trim();

    if (!email || !pass) {
      alert("Моля въведете имейл и парола");
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password: pass,
    });

    if (error) {
      alert("Грешка при вход: " + error.message);
      return;
    }

    user = data.user;
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("app").style.display = "block";

    await loadProfiles();
    initMonths();
    await loadData();
  }

  async function loadProfiles() {
    const { data, error } = await supabase
      .from("profiles")
      .select("*")
      .eq("user_id", user.id);

    if (error) {
      alert("Грешка при зареждане на профили: " + error.message);
      return;
    }

    profiles = data || [];
    if (profiles.length === 0) {
      // Ако няма профили, създаваме "Лични"
      const { error: insertError } = await supabase.from("profiles").insert([
        {
          user_id: user.id,
          name: "Лични",
        },
      ]);
      if (insertError) {
        alert("Грешка при създаване на профил: " + insertError.message);
        return;
      }
      await loadProfiles();
      return;
    }

    currentProfile = profiles[0].id;
    renderProfilesDropdown();
  }

  function renderProfilesDropdown() {
    const sel = document.getElementById("profileSelect");
    sel.innerHTML = "";
    profiles.forEach((p) => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.innerText = p.name;
      sel.appendChild(opt);
    });
    sel.value = currentProfile;
  }

  async function addProfile() {
    const name = prompt("Име на нов профил:");
    if (!name) return;
    const { error } = await supabase.from("profiles").insert([
      {
        user_id: user.id,
        name,
      },
    ]);
    if (error) {
      alert("Грешка при добавяне на профил: " + error.message);
      return;
    }
    await loadProfiles();
  }

  // --- МЕСЕЦИ ---
  function initMonths() {
    const sel = document.getElementById("monthSelect");
    sel.innerHTML = "";
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const monthStr = d.toISOString().slice(0, 7); // YYYY-MM
      const option = document.createElement("option");
      option.value = monthStr;
      option.text = d.toLocaleString("bg-BG", { month: "long", year: "numeric" });
      sel.appendChild(option);
    }
    currentMonth = sel.options[0].value;
    sel.value = currentMonth;
  }

  function switchProfile() {
    const sel = document.getElementById("profileSelect");
    currentProfile = sel.value;
    loadData();
  }

  function switchMonth() {
    const sel = document.getElementById("monthSelect");
    currentMonth = sel.value;
    loadData();
  }

  // --- ЗАРЕЖДАНЕ НА ДАННИТА ---
  async function loadData() {
    if (!user || !currentProfile || !currentMonth) return;

    const startDate = currentMonth + "-01T00:00:00Z";
    const endDateObj = new Date(currentMonth + "-01T00:00:00Z");
    endDateObj.setMonth(endDateObj.getMonth() + 1);
    const endDate = endDateObj.toISOString();

    // Взимаме транзакциите за текущия профил и месец
    const { data, error } = await supabase
      .from("transactions")
      .select("*")
      .eq("user_id", user.id)
      .eq("profile_id", currentProfile)
      .gte("created_at", startDate)
      .lt("created_at", endDate)
      .order("created_at", { ascending: true });

    if (error) {
      alert("Грешка при зареждане на транзакции: " + error.message);
      return;
    }

    renderData(data || []);
  }

  let chart = null;

  function renderData(data) {
    // Баланси
    let bal = 0,
      inc = 0,
      exp = 0,
      bonus = 0;

    // Категории разходи
    let categories = {};

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((d) => {
      let amount = parseFloat(d.amount);

      if (d.name === "bonus") {
        bonus += amount;
      } else {
        bal += amount;
        if (amount > 0) inc += amount;
        else exp += Math.abs(amount);
      }

      if (d.amount < 0) {
        const catKey = d.name.toLowerCase();
        if (!categories[catKey]) categories[catKey] = 0;
        categories[catKey] += Math.abs(amount);
      }

      const div = document.createElement("div");
      div.className = "item " + (amount > 0 ? "income" : amount < 0 ? "expense" : "bonus");
      div.innerHTML = `
        <span class="item-name">${d.name} (${d.type || ""})</span>
        <span class="item-amount">${amount.toFixed(2)} €</span>
        <button class="delete-btn" onclick="deleteTransaction('${d.id}')">✖</button>
      `;
      list.appendChild(div);
    });

    document.getElementById("balance").innerText = bal.toFixed(2) + " €";
    document.getElementById("bonusBalance").innerText = "💎 Бонус: " + bonus.toFixed(2) + " €";

    // Анализ категории
    const analysisDiv = document.getElementById("analysis");
    analysisDiv.innerHTML = "<h3>📊 Разходи по категории:</h3>";

    let topCat = "";
    let max = 0;

    for (const c in categories) {
      const val = categories[c];
      const p = document.createElement("div");
      p.innerText = `${c}: ${val.toFixed(2)} €`;
      analysisDiv.appendChild(p);

      if (val > max) {
        max = val;
        topCat = c;
      }
    }

    if (topCat) {
      const top = document.createElement("div");
      top.innerHTML = `<br><b>Най-много харчиш за: ${topCat} (${max.toFixed(2)} €)</b>`;
      analysisDiv.appendChild(top);
    }

    // Графика
    const ctx = document.getElementById("chart").getContext("2d");
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: ["Доход", "Разход"],
        datasets: [
          {
            label: "Сума",
            data: [inc, exp],
            fill: false,
            borderColor: ["#22c55e", "#ef4444"],
            backgroundColor: ["#22c55e", "#ef4444"],
            tension: 0.3,
          },
        ],
      },
      options: {
        scales: {
          y: { beginAtZero: true },
        },
        plugins: {
          legend: { display: false },
        },
      },
    });
  }

  async function add(type) {
    let name = prompt("Категория:");
    if (!name) return;

    let valStr = prompt("Сума:");
    let val = parseFloat(valStr.replace(",", "."));
    if (isNaN(val)) {
      alert("Моля въведете валидна сума");
      return;
    }
    if (type === "expense") val = -Math.abs(val);
    if (type === "bonus") val = Math.abs(val);

    await supabase.from("transactions").insert([
      {
        user_id: user.id,
        profile_id: currentProfile,
        name: name,
        amount: val,
        created_at: new Date().toISOString(),
        type: type,
      },
    ]);

    await loadData();
  }

  async function deleteTransaction(id) {
    const { error } = await supabase.from("transactions").delete().eq("id", id);
    if (error) {
      alert("Грешка при изтриване: " + error.message);
      return;
    }
    await loadData();
  }
</script>

</body>
</html>
