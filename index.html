<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Login</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
input, button { padding:10px; margin:5px; border-radius:5px; border:none; }
button { cursor:pointer; background:#2563eb; color:white; }
</style>
</head>
<body>

<div id="login">
<h2>🔐 Вход</h2>
<input id="email" placeholder="Имейл">
<input id="pass" type="password" placeholder="Парола">
<button onclick="login()">Login / SignUp</button>
<div id="msg"></div>
</div>

<div id="app" style="display:none;">
<h2>💰 Добре дошъл!</h2>
<p>Вече сте логнат.</p>
</div>

<script>
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

window.onload = async () => {
  const { data } = await supabase.auth.getSession();
  if(data.session){
    showApp(data.session.user);
  }
};

async function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  const msg = document.getElementById("msg");
  msg.innerText="";

  if(!email || !pass){ msg.innerText="Попълни имейл и парола!"; return; }

  // Опитваме login
  let { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if(error){
    // Ако потребителят не съществува, правим signup
    if(error.message.includes("User not found") || error.message.includes("Invalid login")){
      let res = await supabase.auth.signUp({ email, password: pass });
      if(res.error){ msg.innerText="Грешка при регистрация: "+res.error.message; return; }
      msg.innerText="Акаунтът е създаден! Натиснете Login пак.";
      return;
    }
    msg.innerText="Login грешка: "+error.message;
    return;
  }

  showApp(data.user);
}

function showApp(user){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}
</script>
</body>
</html>
