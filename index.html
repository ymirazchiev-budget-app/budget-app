<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<title>Budget Cloud</title>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; margin:0; padding:20px; }
input, button { padding:10px; margin:5px; border-radius:5px; border:none; }
#app { display:none; }
.card { background:#1e293b; margin:10px; padding:10px; border-radius:8px; }
</style>
</head>
<body>

<h2>💰 Budget Cloud</h2>

<div id="loginDiv">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button id="loginBtn">Login / SignUp</button>
<div id="loginMsg" style="color:yellow;"></div>
</div>

<div id="app">
<h3>Баланс: <span id="balance">0.00</span> €</h3>
<button id="incomeBtn">+ Доход</button>
<button id="expenseBtn">- Разход</button>
<button id="bonusBtn">🎁 Бонус</button>
<div id="list"></div>
<div id="analysis"></div>
</div>

<script>
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user = null;

// ✅ Login / SignUp
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  if(!email || !pass){ document.getElementById("loginMsg").innerText = "Въведи email и password!"; return; }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if(error && error.message.includes("User not found")){
    const res = await supabase.auth.signUp({ email, password: pass });
    if(res.error){ document.getElementById("loginMsg").innerText = "Грешка при регистрация: " + res.error.message; return; }
    document.getElementById("loginMsg").innerText = "Акаунт създаден! Натисни Login пак."; return;
  } else if(error){
    document.getElementById("loginMsg").innerText = "Login грешка: " + error.message; return;
  }

  user = data.user;
  document.getElementById("loginDiv").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadTransactions();
});

// ✅ Добавяне на транзакция
async function addTransaction(type){
  if(!user){ alert("Не сте логнат!"); return; }
  let name = prompt("Категория:");
  let val = parseFloat(prompt("Сума:"));
  if(isNaN(val)) return;
  if(type==="expense") val = -Math.abs(val);
  if(type==="bonus") type="bonus";

  await supabase.from("transactions").insert({
    user_id: user.id,
    profile: "Лични",
    name: name || type,
    amount: val
  });

  loadTransactions();
}

// ✅ Трие транзакция
async function deleteTransaction(id){
  if(!user) return;
  await supabase.from("transactions").delete().eq("id", id);
  loadTransactions();
}

// ✅ Зареждане и рендер
async function loadTransactions(){
  if(!user) return;
  const { data } = await supabase.from("transactions").select("*").eq("user_id", user.id);
  renderTransactions(data || []);
}

function renderTransactions(data){
  let bal=0, bonus=0;
  let list=document.getElementById("list");
  let analysisDiv=document.getElementById("analysis");
  list.innerHTML=""; analysisDiv.innerHTML="<h4>Разходи по категории:</h4>";

  let categories={};

  data.forEach(d=>{
    let amount = Number(d.amount);
    if(d.name.toLowerCase()==="bonus"){ bonus += amount; }
    else{
      bal += amount;
      if(amount<0){
        let cat = d.name.toLowerCase();
        categories[cat] = (categories[cat] || 0) + Math.abs(amount);
      }
    }

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${d.name}: <b style="color:${amount<0?'red':'lightgreen'}">${amount.toFixed(2)} €</b> <button onclick="deleteTransaction('${d.id}')">❌</button>`;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText=bal.toFixed(2) + " (€ + бонус " + bonus.toFixed(2) + ")";
  for(let c in categories){ let p=document.createElement("div"); p.innerText=c+": "+categories[c].toFixed(2)+" €"; analysisDiv.appendChild(p); }
}

// ✅ Event listeners за бутоните
document.getElementById("incomeBtn").addEventListener("click",()=>addTransaction("income"));
document.getElementById("expenseBtn").addEventListener("click",()=>addTransaction("expense"));
document.getElementById("bonusBtn").addEventListener("click",()=>addTransaction("bonus"));
</script>
</body>
</html>
