<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_RESTORE_STABLE_v1</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
#app { display:none; margin-top:30px; }
</style>
</head>

<body>

<h2>💰 BudgetCloud_RESTORE_STABLE_v1</h2>

<div id="app">
  <h1 id="welcome"></h1>
  <p>✅ Влязъл си автоматично (без login)</p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// 👉 ТОВА Е КЛЮЧА (старото работещо поведение)
async function init(){

  // 1. Проверка за съществуваща сесия
  let { data } = await supabase.auth.getSession();

  if(data.session){
    user = data.session.user;
    startApp();
    return;
  }

  // 2. Ако няма сесия → автоматичен login (ЕДИН ПЪТ)
  const email = "u2m@mail.bg";
  const password = "12345678"; // сложи твоята реална парола

  let res = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(res.error){
    console.log("Login error:", res.error.message);
    return;
  }

  user = res.data.user;
  startApp();
}

// 👉 стартира app без login UI
function startApp(){
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;
}

// старт
init();
</script>

</body>
</html>
