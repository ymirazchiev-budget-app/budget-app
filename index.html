<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_FinalStableLogin</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
input { padding:10px; margin:5px; border-radius:5px; }
#app, #login { margin-top:20px; }
</style>
</head>
<body>

<h2>💰 BudgetCloud_FinalStableLogin</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Парола">
  <button id="loginBtn">Login / SignUp</button>
</div>

<div id="app" style="display:none;">
  <h1 id="welcome">Добре дошъл!</h1>
</div>

<script>
// ⚠️ Корекция: supabase е глобална, първа буква S
const supabase = Supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// Проверка за сесия
async function checkSession() {
  try {
    const { data, error } = await supabase.auth.getSession();
    if(error) throw error;

    if(data.session && data.session.user){
      user = data.session.user;
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;
    }
  } catch(e) {
    console.log("Сесия няма или грешка:", e.message);
  }
}

// Login / SignUp
async function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if(!email || !pass){ alert("Попълни email и парола"); return; }

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if(error){
      const res = await supabase.auth.signUp({ email, password: pass });
      if(res.error){ alert("Грешка при създаване: " + res.error.message); return; }
      alert("Акаунт създаден! Натисни Login пак.");
      return;
    }
    user = data.user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;
  } catch(e){
    alert("Грешка login: " + e.message);
  }
}

document.getElementById("loginBtn").addEventListener("click", login);

window.onload = () => {
  checkSession();
};
</script>

</body>
</html>
