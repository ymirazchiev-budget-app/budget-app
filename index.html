<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_FinalStableLogin_v3</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px 15px; margin:5px; border:none; border-radius:5px; cursor:pointer; background:#1e40af; color:white; }
button:hover { background:#2563eb; }
input { padding:10px; margin:5px; border-radius:5px; width:200px; }
#app, #login { margin-top:20px; }
</style>
</head>
<body>

<h2>💰 BudgetCloud_FinalStableLogin_v3</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Парола">
  <button id="loginBtn" type="button">Login / SignUp</button>
</div>

<div id="app" style="display:none;">
  <h1 id="welcome">Добре дошъл!</h1>
  <p>След успешен login ще можеш да въвеждаш доходи, разходи и бонуси.</p>
</div>

<script>
// ⚡ Supabase client
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// Проверка на сесия при зареждане
async function checkSession() {
  try {
    const { data, error } = await supabase.auth.getSession();
    if(error){ console.log("Session error:", error.message); return; }

    if(data.session && data.session.user){
      user = data.session.user;
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;
    }
  } catch(e) {
    console.log("checkSession catch:", e.message);
  }
}

// Login / SignUp
async function login() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value;

  if(!email || !pass){ alert("Попълни email и парола"); return; }

  try {
    // Опит за login
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if(error){
      // Ако няма акаунт → signup
      const { data: signData, error: signError } = await supabase.auth.signUp({ email, password: pass });
      if(signError){ alert("Грешка при създаване: " + signError.message); return; }
      alert("Акаунт създаден! Натисни Login пак.");
      return;
    }

    // Login успешен
    user = data.user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;

  } catch(e){
    alert("Login catch: " + e.message);
  }
}

// Добавяне на click listener
document.getElementById("loginBtn").addEventListener("click", login);

// Проверка на сесия при зареждане
window.addEventListener("load", checkSession);
</script>

</body>
</html>
