<!DOCTYPE html>
<html lang="bg">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
.card { background:#1e293b; margin:10px; padding:15px; border-radius:10px; }
button, input, select { padding:10px; margin:5px; }
</style>
</head>

<body>

<div id="login" class="card">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
<h2 id="balance">0 €</h2>

<button onclick="add('income')">+ Доход</button>
<button onclick="add('expense')">- Разход</button>
<button onclick="add('bonus')">🎁 Бонус</button>

<div id="list"></div>
</div>

<script>
const client = supabase.createClient(
"https://ipihscvyyxetkiajjllg.supabase.co",
"sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// AUTO LOGIN
window.onload = async ()=>{
  const { data } = await client.auth.getSession();

  if(data.session){
    user = data.session.user;
    start();
  }
};

async function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  let { data, error } = await client.auth.signInWithPassword({email,password:pass});

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

// LOAD DATA
async function load(){
  let { data, error } = await client
    .from("transactions")
    .select("*")
    .eq("user_id", user.id);

  if(error){
    alert("Грешка load: "+error.message);
    return;
  }

  render(data || []);
}

// RENDER
function render(data){
  let bal=0;
  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(d=>{
    let amount = Number(d.amount);
    bal += amount;

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${d.name} (${d.type})
      <b>${amount.toFixed(2)} €</b>
      <button onclick="del('${d.id}')">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";
}

// ADD (С DEBUG)
async function add(type){
  let name=prompt("Категория:");
  let val=prompt("Сума:");

  val = parseFloat(val.replace(",","."));

  if(isNaN(val)){
    alert("Невалидна сума");
    return;
  }

  if(type==="expense") val=-val;

  let { error } = await client.from("transactions").insert({
    user_id:user.id,
    name:name || type,
    amount:val,
    type:type,
    created_at:new Date().toISOString()
  });

  if(error){
    alert("Грешка запис: "+error.message);
  } else {
    load();
  }
}

// DELETE
async function del(id){
  let { error } = await client.from("transactions").delete().eq("id", id);

  if(error){
    alert("Грешка триене: "+error.message);
  } else {
    load();
  }
}
</script>

</body>
</html>
