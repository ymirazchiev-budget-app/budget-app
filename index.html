<!DOCTYPE html>

<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget - 9123</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.header { padding:15px; }
.balance { font-size:30px; }

button, select {
  padding:8px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div id="login">
<h2>🔐 PIN</h2>
<input type="password" id="pin">
<button onclick="login()">Вход</button>
</div>

<div id="app" style="display:none;">

<div class="header">
<h2>💰 Budget - 9123</h2>

<select id="profile" onchange="switchProfile()"></select> <button onclick="addProfile()">+ Профил</button>

<div class="balance" id="balance">0 €</div>
</div>

<button onclick="add('income')">+ Доход</button> <button onclick="add('expense')">- Разход</button> <button onclick="add('bonus')">🎁 Бонус</button>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📊 Най-голям разход:</h3>
<div id="topCategory"></div>
</div>

<div id="list"></div>

</div>

<script>
let PIN="9888";

let profiles = JSON.parse(localStorage.getItem("profiles")) || {
  "Лични": []
};

let current = localStorage.getItem("currentProfile") || "Лични";

function login(){
  if(document.getElementById("pin").value===PIN){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadProfiles();
    update();
  }
}

function save(){
  localStorage.setItem("profiles", JSON.stringify(profiles));
  localStorage.setItem("currentProfile", current);
}

function loadProfiles(){
  let sel=document.getElementById("profile");
  sel.innerHTML="";
  Object.keys(profiles).forEach(p=>{
    let o=document.createElement("option");
    o.value=p;
    o.innerText=p;
    sel.appendChild(o);
  });
  sel.value=current;
}

function switchProfile(){
  current=document.getElementById("profile").value;
  save();
  update();
}

function addProfile(){
  let name=prompt("Име на профил:");
  if(!name) return;
  profiles[name]=[];
  current=name;
  save();
  loadProfiles();
  update();
}

function update(){
  let data=profiles[current];
  let bal=0, inc=0, exp=0;
  let cats={};

  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    bal+=d.amount;
    if(d.amount>0) inc+=d.amount;
    else {
      exp+=d.amount;
      cats[d.name]=(cats[d.name]||0)+Math.abs(d.amount);
    }

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      ${d.name}<br>
      <b style="color:${d.amount<0?'red':'lightgreen'}">${d.amount} €</b>
      <button onclick="del(${i})">❌</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText=bal+" €";

  // най-голям разход
  let top="";
  let max=0;
  for(let c in cats){
    if(cats[c]>max){
      max=cats[c];
      top=c;
    }
  }

  document.getElementById("topCategory").innerText =
    top ? top + " ("+max+" €)" : "няма";

  drawChart(inc,Math.abs(exp));
}

function add(type){
  let name=prompt("Категория:");
  let val=parseFloat(prompt("Сума:"));

  if(type==="expense") val=-val;

  profiles[current].push({name:name||type,amount:val});
  save();
  update();
}

function del(i){
  profiles[current].splice(i,1);
  save();
  update();
}

let chart;

function drawChart(inc,exp){
  let ctx=document.getElementById("chart");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Доход','Разход'],
      datasets:[{
        data:[inc,exp],
        backgroundColor:['#22c55e','#ef4444']
      }]
    }
  });
}
</script>

</body>
</html>
