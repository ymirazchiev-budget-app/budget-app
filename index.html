<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_FINAL_v14</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; margin:0; padding:0; }
button { padding:4px 6px; margin:2px; border:none; border-radius:4px; cursor:pointer; font-size:12px; }
.container { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
.col { width:45%; min-width:250px; }
.card { background:#1e293b; margin:2px; padding:4px 6px; border-radius:5px; font-size:12px; display:flex; justify-content:space-between; align-items:center; }
.card button { padding:2px 4px; font-size:10px; }
.balance { font-size:22px; margin:10px; }
.analysis { background:#020617; padding:10px; margin:5px 0; border-radius:10px; }
canvas { margin-top:10px; }
.summary { margin:5px; padding:5px; background:#1e293b; border-radius:5px; font-size:12px; display:flex; justify-content:space-around; }
#filterMonth { margin:10px; padding:4px; border-radius:4px; }
</style>
</head>
<body>

<h3>💰 BudgetCloud_FINAL_v14</h3>
<div class="balance" id="balance">0.00 €</div>

<select id="filterMonth">
  <option value="all">Всички месеци</option>
</select>

<button id="btnIncome">+ Доход</button>
<button id="btnExpense">- Разход</button>
<button id="btnBonus">💎 Бонус</button>
<button onclick="window.print()">🖨️ Печат</button>

<div class="container">
  <div class="col">
    <h4>Доходи / Бонуси</h4>
    <div id="incomeList"></div>
  </div>
  <div class="col">
    <h4>Разходи</h4>
    <div id="expenseList"></div>
  </div>
</div>

<div class="container">
  <div class="col analysis">
    <h4>📊 Анализ Доходи / Бонуси</h4>
    <div id="incomeAnalysis"></div>
    <canvas id="chartIncome"></canvas>
  </div>
  <div class="col analysis">
    <h4>📊 Анализ Разходи</h4>
    <div id="expenseAnalysis"></div>
    <canvas id="chartExpense"></canvas>
  </div>
</div>

<div class="summary" id="summary"></div>

<script>
let data = JSON.parse(localStorage.getItem("data") || "[]");
let chartIncome, chartExpense;

function getMonthOptions() {
  let months = Array.from(new Set(data.map(t=>new Date(t.date).toLocaleString("bg-BG",{month:"long", year:"numeric"}))));
  const sel = document.getElementById("filterMonth");
  sel.innerHTML='<option value="all">Всички месеци</option>';
  months.forEach(m=>sel.innerHTML += `<option value="${m}">${m}</option>`);
}

function addTransaction(type){
  let options = [];
  if(type==="expense") options = ["храна","пазар","ток","вода"];
  if(type==="income") options = ["заплата","помощи"];
  if(type==="bonus") options = ["бонус","подарък","клиент"];

  let name = prompt("За какво? (пример: "+options.join(", ")+")");
  if(!name) return;

  let fromWhom = "";
  if(type==="bonus") fromWhom = prompt("От кого/обект/клиент?") || "-";

  let method = prompt("От къде? (банка/карта/кеш)") || "-";

  let val = parseFloat(prompt("Колко?").replace(",", "."));
  if(isNaN(val)) return;
  if(type==="expense") val = -Math.abs(val);

  let date = new Date().toISOString();

  data.push({id:Date.now(), name, fromWhom, amount: val, method, type, date});
  localStorage.setItem("data", JSON.stringify(data));
  getMonthOptions();
  render();
}

function render(){
  let sel = document.getElementById("filterMonth").value;
  let filtered = sel==="all" ? data : data.filter(t=>new Date(t.date).toLocaleString("bg-BG",{month:"long", year:"numeric"})===sel);

  let incomeDiv = document.getElementById("incomeList");
  let expenseDiv = document.getElementById("expenseList");
  let incomeAnal = document.getElementById("incomeAnalysis");
  let expenseAnal = document.getElementById("expenseAnalysis");
  let summaryDiv = document.getElementById("summary");

  incomeDiv.innerHTML="";
  expenseDiv.innerHTML="";
  incomeAnal.innerHTML="";
  expenseAnal.innerHTML="";
  summaryDiv.innerHTML="";

  let bal=0, incCats={}, expCats={};
  let totalIncome=0, totalExpense=0, totalBonus=0;

  filtered.forEach(t=>{
    let a = Number(t.amount);
    bal += a;

    const div = document.createElement("div");
    div.className = "card";

    let label = t.name;
    if(t.type==="bonus" && t.fromWhom) label += ` (${t.fromWhom})`;
    label += ` (${t.method})`;
    div.innerHTML = `<span>${label}</span>`;

    const span = document.createElement("span");
    span.textContent = `${a.toFixed(2)} € `;

    const delBtn = document.createElement("button");
    delBtn.textContent="❌";
    delBtn.addEventListener("click",()=>{ del(t.id); });
    span.appendChild(delBtn);
    div.appendChild(span);

    if(a>=0){
      incomeDiv.appendChild(div);
      if(t.type==="bonus") totalBonus+=a;
      else totalIncome+=a;
      if(!incCats[t.name]) incCats[t.name]=0;
      incCats[t.name]+=a;
    } else {
      expenseDiv.appendChild(div);
      totalExpense += Math.abs(a);
      if(!expCats[t.name]) expCats[t.name]=0;
      expCats[t.name]+=Math.abs(a);
    }
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";

  for(let k in incCats){
    let div = document.createElement("div");
    div.textContent = `${k}: ${incCats[k].toFixed(2)} €`;
    incomeAnal.appendChild(div);
  }
  for(let k in expCats){
    let div = document.createElement("div");
    div.textContent = `${k}: ${expCats[k].toFixed(2)} €`;
    expenseAnal.appendChild(div);
  }

  summaryDiv.innerHTML=`Доходи: ${totalIncome.toFixed(2)} € | Бонуси: ${totalBonus.toFixed(2)} € | Разходи: ${totalExpense.toFixed(2)} €`;

  drawChart("chartIncome", incCats, "green", chartIncome, c=>chartIncome=c);
  drawChart("chartExpense", expCats, "red", chartExpense, c=>chartExpense=c);
}

function del(id){
  data = data.filter(t => t.id !== id);
  localStorage.setItem("data", JSON.stringify(data));
  getMonthOptions();
  render();
}

function drawChart(canvasId, cats, color, chartVar, setChart){
  const ctx=document.getElementById(canvasId);
  if(chartVar) chartVar.destroy();

  let labels=Object.keys(cats);
  let values=Object.values(cats);

  let newChart=new Chart(ctx,{
    type:"bar",
    data:{ labels, datasets:[{data:values, backgroundColor:color}] },
    options:{ responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
  });

  setChart(newChart);
}

document.getElementById("btnIncome").addEventListener("click",()=>addTransaction("income"));
document.getElementById("btnExpense").addEventListener("click",()=>addTransaction("expense"));
document.getElementById("btnBonus").addEventListener("click",()=>addTransaction("bonus"));
document.getElementById("filterMonth").addEventListener("change", render);

getMonthOptions();
render();
</script>

</body>
</html>
