<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Cloud FIX</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; margin:0; }
button, input { padding:10px; margin:5px; border-radius:6px; border:none; }
#app { display:none; }
.card { background:#1e293b; margin:5px; padding:10px; border-radius:8px; }
</style>
</head>
<body>

<h2>💰 Budget Cloud</h2>

<div id="loginDiv">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Парола">
  <button id="loginBtn">Login / SignUp</button>
</div>

<div id="app">
  <h1 id="balance">0 €</h1>
  <button onclick="add('income')">+ Доход</button>
  <button onclick="add('expense')">- Разход</button>
  <button onclick="add('bonus')">🎁 Бонус</button>
  <div id="list"></div>
</div>

<script>
const client = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// Проверка за съществуваща сесия
window.onload = async () => {
  const { data } = await client.auth.getSession();
  if(data.session){
    user = data.session.user;
    showApp();
    load();
  }
};

// Login / SignUp
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  
  if(!email || !pass){
    alert("Въведи email и парола!");
    return;
  }
  
  // Опит за login
  let { data, error } = await client.auth.signInWithPassword({ email, password: pass });
  
  if(error){
    // Ако няма акаунт – създаваме
    let { data: signupData, error: signupError } = await client.auth.signUp({ email, password: pass });
    if(signupError){
      alert("Грешка: " + signupError.message);
      return;
    }
    alert("Акаунт създаден! Натисни Login отново.");
    return;
  }
  
  user = data.user;
  showApp();
  load();
});

function showApp(){
  document.getElementById("loginDiv").style.display="none";
  document.getElementById("app").style.display="block";
}

// Зареждане на транзакции
async function load(){
  let { data } = await client.from("transactions").select("*").eq("user_id", user.id);
  render(data || []);
}

function render(data){
  let bal=0;
  let list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((d,i)=>{
    let amount = Number(d.amount);
    bal += amount;

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${d.name}: ${amount.toFixed(2)} € <button onclick="del(${i})">❌</button>`;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";
}

// Добавяне на транзакции
async function add(type){
  let name = prompt("Категория:");
  let val = parseFloat(prompt("Сума:"));
  if(isNaN(val)) return;
  if(type==="expense") val=-val;

  await client.from("transactions").insert({
    user_id:user.id,
    profile:"Лични",
    name:name || type,
    amount:val,
    created_at: new Date()
  });

  load();
}

// Триене
async function del(index){
  let { data } = await client.from("transactions").select("*").eq("user_id", user.id);
  if(!data || !data[index]) return;
  await client.from("transactions").delete().eq("id", data[index].id);
  load();
}
</script>

</body>
</html>
