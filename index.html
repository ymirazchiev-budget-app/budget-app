<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_LoginStable</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
input { padding:10px; margin:5px; border-radius:5px; }
</style>
</head>
<body>

<h2>💰 BudgetCloud_LoginStable</h2>

<div id="login">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Парола">
  <button id="loginBtn">Login</button>
</div>

<div id="app" style="display:none;">
  <h1 id="welcome">Добре дошъл!</h1>
</div>

<script>
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// ✅ Автоматичен login ако вече има сесия
window.onload = async () => {
  const { data } = await supabase.auth.getSession();
  if(data.session){
    user = data.session.user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;
  }
};

// ✅ Login бутон
document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if(!email || !pass){ alert("Попълни email и парола"); return; }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if(error){
    // Ако няма акаунт, създаваме
    const res = await supabase.auth.signUp({ email, password: pass });
    if(res.error){ alert("Грешка: " + res.error.message); return; }
    alert("Акаунт създаден! Натисни Login пак.");
    return;
  }

  user = data.user;
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Влязъл си като: " + user.email;
};
</script>

</body>
</html>
