<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
.row { display:flex; gap:10px; justify-content:center; }
.col { width:45%; }
.item { font-size:14px; margin:2px; }
button { margin:2px; padding:6px; }
canvas { height:120px !important; }
</style>
</head>
<body>

<h2>💰 BudgetCloud_RESTORE_STABLE_v2</h2>

<div class="row">
  <button onclick="add('income')">Доход</button>
  <button onclick="add('bonus')">Бонус</button>
  <button onclick="add('expense')">Разход</button>
</div>

<div class="row">
  <div class="col">
    <h3>Доход + Бонус</h3>
    <div id="inc"></div>
    <div id="incA"></div>
  </div>

  <div class="col">
    <h3>Разход</h3>
    <div id="exp"></div>
    <div id="expA"></div>
  </div>
</div>

<div class="row">
  <canvas id="c1"></canvas>
  <canvas id="c2"></canvas>
</div>

<script>

const db = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let chart1, chart2;

async function load(){
  const { data } = await db.from("transactions").select("*");
  render(data || []);
}

async function add(type){
  let category = prompt("Какво?");
  let method = prompt("Къде? (кеш/карта/банка)");
  let amount = parseFloat(prompt("Сума"));

  if(!category || isNaN(amount)) return;

  if(type==="expense") amount = -Math.abs(amount);

  await db.from("transactions").insert([{
    type, category, method, amount
  }]);

  load();
}

async function del(id){
  await db.from("transactions").delete().eq("id", id);
  load();
}

function render(data){

  let incHTML="", expHTML="";
  let incSum=0, expSum=0;

  let incL=[], incD=[];
  let expL=[], expD=[];

  data.forEach(t=>{

    let row = `${t.category} (${t.method}) ${t.amount}€ 
    <button onclick="del('${t.id}')">X</button><br>`;

    if(t.type==="income" || t.type==="bonus"){
      incHTML += row;
      incSum += t.amount;
      incL.push(t.category);
      incD.push(t.amount);
    }else{
      expHTML += row;
      expSum += Math.abs(t.amount);
      expL.push(t.category);
      expD.push(Math.abs(t.amount));
    }

  });

  inc.innerHTML = incHTML;
  exp.innerHTML = expHTML;

  incA.innerHTML = "Общо: " + incSum.toFixed(2) + " €";
  expA.innerHTML = "Общо: " + expSum.toFixed(2) + " €";

  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();

  chart1 = new Chart(c1, {
    type:"bar",
    data:{ labels:incL, datasets:[{data:incD, backgroundColor:"green"}] },
    options:{plugins:{legend:{display:false}}}
  });

  chart2 = new Chart(c2, {
    type:"bar",
    data:{ labels:expL, datasets:[{data:expD, backgroundColor:"red"}] },
    options:{plugins:{legend:{display:false}}}
  });
}

load();

</script>

</body>
</html>
