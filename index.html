<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Cloud FINAL MAX++</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; margin:0; padding:0; }
input, button { padding:8px; margin:5px; border-radius:6px; border:none; }
.card { background:#1e293b; margin:5px; padding:10px; border-radius:8px; }
#login, #app { padding:10px; }
</style>
</head>
<body>

<h2>💰 Budget Cloud FINAL MAX++</h2>

<div id="login">
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3 id="balance">0 €</h3>
  <select id="profile" onchange="switchProfile()"></select>
  <button onclick="addProfile()">+ Профил</button>
  <br>
  <button onclick="add('income')">+ Доход</button>
  <button onclick="add('expense')">- Разход</button>
  <button onclick="add('bonus')">🎁 Бонус</button>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div id="list"></div>
  <div id="analysis"></div>
</div>

<script>
const client = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;
let currentProfile = localStorage.getItem("currentProfile") || "Лични";
let profiles = JSON.parse(localStorage.getItem("profiles")) || { "Лични": [] };
let chart;

window.onload = async () => {
  const { data } = await client.auth.getSession();
  if(data.session){
    user = data.session.user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadProfiles();
    load();
  }
};

async function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  let { data, error } = await client.auth.signInWithPassword({ email, password: pass });

  if(error){
    alert("Login грешка: " + error.message);
    return;
  }

  user = data.user;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  loadProfiles();
  load();
}

function loadProfiles(){
  let sel = document.getElementById("profile");
  sel.innerHTML = "";
  Object.keys(profiles).forEach(p=>{
    let o = document.createElement("option");
    o.value = p;
    o.innerText = p;
    sel.appendChild(o);
  });
  sel.value = currentProfile;
}

function switchProfile(){
  currentProfile = document.getElementById("profile").value;
  localStorage.setItem("currentProfile", currentProfile);
  load();
}

function addProfile(){
  let name = prompt("Име на профил:");
  if(!name) return;
  profiles[name] = [];
  currentProfile = name;
  localStorage.setItem("profiles", JSON.stringify(profiles));
  loadProfiles();
}

async function load(){
  let { data } = await client
    .from("transactions")
    .select("*")
    .eq("profile", currentProfile)
    .eq("user_id", user.id)
    .order('created_at', {ascending:true});

  render(data || []);
}

function render(data){
  let bal=0;
  let list=document.getElementById("list");
  list.innerHTML="";
  let categories={}, monthData={};

  data.forEach(d=>{
    let amount = parseFloat(d.amount);
    bal += amount;

    // списък
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML = `${d.name}: ${amount.toFixed(2)} € <button onclick="del('${d.id}')">❌</button>`;
    list.appendChild(div);

    // категории
    if(amount < 0){
      let cat = d.name.toLowerCase();
      categories[cat] = (categories[cat] || 0) + Math.abs(amount);
    }

    // по месеци
    let month = new Date(d.created_at).toLocaleString("bg-BG",{month:"short", year:"numeric"});
    monthData[month] = monthData[month] || { income:0, expense:0 };
    if(amount >=0) monthData[month].income += amount;
    else monthData[month].expense += Math.abs(amount);
  });

  document.getElementById("balance").innerText = bal.toFixed(2) + " €";

  // анализ категории
  let analysisDiv = document.getElementById("analysis");
  analysisDiv.innerHTML = "<h3>📊 Разходи по категории:</h3>";
  let topCat="", max=0;
  for(let c in categories){
    let val = categories[c];
    let p = document.createElement("div");
    p.innerText = c + ": " + val.toFixed(2) + " €";
    analysisDiv.appendChild(p);
    if(val > max){ max=val; topCat=c; }
  }
  if(topCat){
    let top = document.createElement("div");
    top.innerHTML = "<b>🥇 Най-много харчиш за: " + topCat + " (" + max.toFixed(2) + " €)</b>";
    analysisDiv.appendChild(top);
  }

  // графика по месеци
  let labels = Object.keys(monthData);
  let income = labels.map(l=>monthData[l].income.toFixed(2));
  let expense = labels.map(l=>monthData[l].expense.toFixed(2));
  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type:'line',
    data:{
      labels: labels,
      datasets:[
        {label:'Доход', data:income, borderColor:'#22c55e', fill:false},
        {label:'Разход', data:expense, borderColor:'#ef4444', fill:false}
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });
}

async function add(type){
  let name=prompt("Категория:");
  let val=parseFloat(prompt("Сума:"));
  if(isNaN(val)) return;
  if(type==="expense") val=-val;

  await client.from("transactions").insert([{
    user_id:user.id,
    profile:currentProfile,
    name:name || type,
    amount:val,
    created_at:new Date().toISOString()
  }]);

  load();
}

async function del(id){
  await client.from("transactions").delete().eq("id", id);
  load();
}
</script>

</body>
</html>
