<div id="loginDiv">

  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <div id="msg" style="margin-top:10px; color:yellow;"></div>
</div>

<div id="app">
  <h1 id="balance">0 €</h1>

<script>
// Инициализация Supabase
const client = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// Проверка за вече запазена сесия
window.onload = async () => {
  const { data } = await client.auth.getSession();
  if (data.session) {
    user = data.session.user;
    showApp();
    load();
  }
};

// Пълен login, сработва на click
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  if (!email || !pass) {
    document.getElementById("msg").innerText = "Въведи email и password";
    return;
  }

  const { data, error } = await client.auth.signInWithPassword({ email, password: pass });
  if (error) {
    document.getElementById("msg").innerText = "Login грешка: " + error.message;
    return;
  }

  user = data.user;
  showApp();
  load();
});

// Покажи app, скри login
function showApp() {
  document.getElementById("loginDiv").style.display = "none";
  document.getElementById("app").style.display = "block";
}

</script>
