<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_MONTHLY_REVOLUT_v5</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }

button { padding:6px; margin:3px; border:none; border-radius:5px; cursor:pointer; font-size:13px; }

.card {
  background:#1e293b;
  margin:2px auto;
  padding:3px 6px;
  border-radius:5px;
  font-size:12px;
  max-width:400px;
  display:flex;
  justify-content:space-between;
}

.day {
  background:#020617;
  margin-top:8px;
  padding:5px;
  border-radius:6px;
  font-weight:bold;
}

.balance { font-size:22px; margin:10px; }

.analysis { background:#020617; padding:10px; margin:10px; border-radius:10px; }

select { padding:5px; margin:5px; }

</style>
</head>

<body>

<h3>💰 BudgetCloud_MONTHLY_REVOLUT_v5</h3>

<div class="balance" id="balance">0.00 €</div>

<select id="monthFilter"></select>

<br>

<button onclick="flow('income')">+ Доход</button>
<button onclick="flow('expense')">- Разход</button>
<button onclick="flow('bonus')">💎 Бонус</button>
<button onclick="window.print()">🖨️ Печат</button>

<div id="list"></div>

<div class="analysis">
  <b>📊 Разходи по категории</b>
  <div id="analysis"></div>
  <canvas id="chart"></canvas>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");
let chart;

// FLOW
function flow(type){

  let nameOptions = [];

  if(type==="expense"){
    nameOptions = ["храна","пазар","ток","вода","наем","гориво"];
  }

  if(type==="income"){
    nameOptions = ["заплата","помощи"];
  }

  if(type==="bonus"){
    nameOptions = ["запл","под.","клиент"];
  }

  let name = prompt("Избери или напиши:\n\n" + nameOptions.join(", "));
  if(!name) return;

  name = autoCategory(name);

  let method = prompt("Къде? (банка/карта/кеш)");
  if(!method) method="-";

  let val = parseFloat(prompt("Колко?").replace(",", "."));
  if(isNaN(val)) return;

  if(type==="expense") val = -Math.abs(val);

  data.push({
    id: Date.now(),
    name,
    amount: val,
    method,
    date: new Date().toISOString()
  });

  localStorage.setItem("data", JSON.stringify(data));
  render();
}

// MONTH FILTER
function getMonths(){
  let months = [...new Set(data.map(d => d.date.slice(0,7)))];
  return months.sort().reverse();
}

function initMonths(){
  const sel = document.getElementById("monthFilter");
  sel.innerHTML="";

  getMonths().forEach(m=>{
    let opt=document.createElement("option");
    opt.value=m;
    opt.textContent=m;
    sel.appendChild(opt);
  });

  sel.onchange = render;
}

// RENDER
function render(){

  initMonths();

  let selected = document.getElementById("monthFilter").value;

  let filtered = data.filter(d => d.date.startsWith(selected));

  let list = document.getElementById("list");
  list.innerHTML="";

  let bal=0;
  let cats={};

  // групиране по дни
  let days = {};

  filtered.forEach(t=>{
    let day = t.date.slice(0,10);

    if(!days[day]) days[day]=[];
    days[day].push(t);
  });

  Object.keys(days).sort().reverse().forEach(day=>{

    let daySum = 0;

    const dDiv = document.createElement("div");
    dDiv.className="day";

    days[day].forEach(t=>{
      daySum += Number(t.amount);
      bal += Number(t.amount);

      if(t.amount < 0){
        if(!cats[t.name]) cats[t.name]=0;
        cats[t.name]+=Math.abs(t.amount);
      }
    });

    dDiv.innerText = `${day} | ${daySum.toFixed(2)} €`;
    list.appendChild(dDiv);

    days[day].forEach(t=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <span>${t.name} (${t.method})</span>
        <span>${Number(t.amount).toFixed(2)} €</span>
      `;

      list.appendChild(div);
    });

  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";

  // анализ
  const aDiv=document.getElementById("analysis");
  aDiv.innerHTML="";

  let labels=[], values=[];

  for(let c in cats){
    labels.push(c);
    values.push(cats[c]);

    let p=document.createElement("div");
    p.innerText = c + ": " + cats[c].toFixed(2)+" €";
    aDiv.appendChild(p);
  }

  draw(labels, values);
}

// GRAPH
function draw(labels, values){
  const ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:"#ef4444"
      }]
    }
  });
}

// AUTO CATEGORY
function autoCategory(name){
  let n=name.toLowerCase();
  if(n.includes("пица") || n.includes("храна")) return "храна";
  if(n.includes("ток")) return "ток";
  if(n.includes("пазар")) return "пазар";
  return name;
}

// START
render();

</script>

</body>
</html>
