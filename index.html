<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
input, button { padding:10px; margin:5px; font-size:16px; }
button { cursor:pointer; }
#status { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>

<h2>💰 Budget Cloud</h2>

<input id="email" type="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button id="loginBtn">Login / SignUp</button>
<div id="status"></div>

<div id="app" style="display:none;">
  <h1 id="balance">0 €</h1>
  <button onclick="add('income')">+ Доход</button>
  <button onclick="add('expense')">- Разход</button>
  <button onclick="add('bonus')">💎 Бонус</button>
  <div id="list"></div>
</div>

<script>
const supabase = supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// Стартираме listener след като DOM е готов
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("loginBtn").addEventListener("click", async (e) => {
    e.preventDefault();
    await login();
  });
});

// Async login/signUp
async function login() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value.trim();
  if(!email || !pass) {
    document.getElementById("status").innerText = "Въведи email и парола!";
    return;
  }

  // Опитваме login
  const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({
    email, password: pass
  });

  if(loginError) {
    // Ако акаунт няма → signup
    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password: pass });
    if(signUpError) {
      document.getElementById("status").innerText = "Грешка при signup: " + signUpError.message;
      return;
    }
    document.getElementById("status").innerText = "Акаунт създаден! Натисни Login пак.";
    return;
  }

  user = loginData.user;
  document.getElementById("status").innerText = "✅ Влезе успешно: " + user.email;
  document.getElementById("app").style.display = "block";

  // Можем да заредим transactions тук
  loadTransactions();
}

// Примерна функция за transactions
async function loadTransactions() {
  if(!user) return;
  const { data, error } = await supabase.from("transactions").select("*").eq("user_id", user.id);
  if(error) { console.error(error); return; }

  let balance = 0;
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.forEach(d => {
    let amount = Number(d.amount);
    balance += amount;
    let div = document.createElement("div");
    div.innerText = `${d.name}: ${amount.toFixed(2)} €`;
    list.appendChild(div);
  });
  document.getElementById("balance").innerText = balance.toFixed(2) + " €";
}

// Пример add функция
async function add(type){
  if(!user) { alert("Влез първо!"); return; }
  const name = prompt("Категория:");
  let val = parseFloat(prompt("Сума:"));
  if(isNaN(val)) return;
  if(type==="expense") val = -val;

  await supabase.from("transactions").insert({
    user_id: user.id,
    profile: "Лични",
    name: name || type,
    amount: val,
    created_at: new Date().toISOString()
  });

  loadTransactions();
}
</script>
</body>
</html>
