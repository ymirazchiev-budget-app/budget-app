<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_SMART_INPUT_v4</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }

button { padding:6px; margin:3px; border:none; border-radius:5px; cursor:pointer; font-size:13px; }

.card {
  background:#1e293b;
  margin:2px auto;
  padding:3px 6px;
  border-radius:5px;
  font-size:12px;
  max-width:400px;
  display:flex;
  justify-content:space-between;
}

.balance { font-size:22px; margin:10px; }

.analysis { background:#020617; padding:10px; margin:10px; border-radius:10px; }

.selector {
  margin:5px;
}

.selector button {
  background:#334155;
}

</style>
</head>

<body>

<h3>💰 BudgetCloud_SMART_INPUT_v4</h3>

<div class="balance" id="balance">0.00 €</div>

<button id="btnIncome">+ Доход</button>
<button id="btnExpense">- Разход</button>
<button id="btnBonus">💎 Бонус</button>
<button onclick="window.print()">🖨️ Печат</button>

<div id="list"></div>

<div class="analysis">
  <b>📊 Разходи по категории</b>
  <div id="analysis"></div>
  <canvas id="chart"></canvas>
</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");
let chart;

// BUTTONS
document.getElementById("btnIncome").addEventListener("click", ()=>flow("income"));
document.getElementById("btnExpense").addEventListener("click", ()=>flow("expense"));
document.getElementById("btnBonus").addEventListener("click", ()=>flow("bonus"));

// 🔥 SMART FLOW
function flow(type){

  let nameOptions = [];
  let fromOptions = [];

  if(type==="expense"){
    nameOptions = ["храна","пазар","ток","вода","наем","гориво","забавление"];
  } else {
    nameOptions = ["заплата","бонус","подарък","възстановяване","клиент"];
  }

  fromOptions = ["банка","карта","кеш"];

  // 1. избор или ръчно
  let name = prompt(
    "Избери или напиши:\n\n" +
    nameOptions.join(", ")
  );

  if(!name) return;

  name = autoCategory(name);

  // 2. метод
  let method = prompt(
    "Къде?\n\n" +
    fromOptions.join(", ")
  );

  if(!method) method="-";

  // 3. сума
  let val = parseFloat(prompt("Колко?").replace(",", "."));
  if(isNaN(val)) return;

  if(type==="expense") val = -Math.abs(val);

  save(name, val, method, type);
}

// SAVE
function save(name, amount, method, type){
  data.push({
    id: Date.now(),
    name,
    amount,
    method,
    type
  });

  localStorage.setItem("data", JSON.stringify(data));
  render();
}

// DELETE
function del(id){
  data = data.filter(t => t.id !== id);
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

// RENDER
function render(){

  let bal=0;
  let cats={};
  let grouped={};

  const list = document.getElementById("list");
  list.innerHTML="";

  data.forEach(t=>{
    let key = t.name + "_" + t.method + "_" + t.type;

    if(!grouped[key]){
      grouped[key] = {...t};
    } else {
      grouped[key].amount += t.amount;
    }
  });

  Object.values(grouped).forEach(t=>{
    let a = Number(t.amount);
    bal += a;

    if(a<0){
      if(!cats[t.name]) cats[t.name]=0;
      cats[t.name]+=Math.abs(a);
    }

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <span>${t.name} (${t.method})</span>
      <span>${a.toFixed(2)} € 
      <button onclick="del(${t.id})">❌</button></span>
    `;

    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";

  const aDiv = document.getElementById("analysis");
  aDiv.innerHTML="";

  let labels=[], values=[];

  for(let c in cats){
    labels.push(c);
    values.push(cats[c]);

    let p=document.createElement("div");
    p.innerText = c + ": " + cats[c].toFixed(2)+" €";
    aDiv.appendChild(p);
  }

  draw(labels, values);
}

// GRAPH
function draw(labels, values){
  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:"#ef4444"
      }]
    }
  });
}

// AUTO CATEGORY
function autoCategory(name){
  let n = name.toLowerCase();
  if(n.includes("пица") || n.includes("храна")) return "храна";
  if(n.includes("ток")) return "ток";
  if(n.includes("пазар")) return "пазар";
  return name;
}

// START
render();

</script>

</body>
</html>
