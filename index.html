<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetCloud_SUPABASE_FIXED_v2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family:Arial; background:#0f172a; color:white; text-align:center; }
button { padding:6px; margin:3px; }
.card { background:#1e293b; margin:3px; padding:5px; border-radius:5px; }
</style>
</head>

<body>

<h3>💰 BudgetCloud_SUPABASE_FIXED_v2</h3>

<div id="balance">0.00 €</div>

<button onclick="addIncome()">+ Доход</button>
<button onclick="addExpense()">- Разход</button>
<button onclick="addBonus()">💎 Бонус</button>

<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
  "https://ipihscvyyxetkiajjllg.supabase.co",
  "sb_publishable_r7Bgf2u5ZK30-DQVHPSHHQ_xgnsXY2x"
);

let user;

// 🔥 START
async function init(){

  let { data } = await supabase.auth.getSession();

  if(!data.session){
    const res = await supabase.auth.signInWithPassword({
      email: "u2m@mail.bg",
      password: "12345678" // 👉 сложи твоята
    });

    if(res.error){
      alert("LOGIN ERROR: " + res.error.message);
      return;
    }

    user = res.data.user;
  } else {
    user = data.session.user;
  }

  load();
}

// ➕ ДОХОД
async function addIncome(){
  let name = prompt("Доход:");
  let val = parseFloat(prompt("Сума:"));
  if(!name || isNaN(val)) return;

  await save(name, val);
}

// ➖ РАЗХОД
async function addExpense(){
  let name = prompt("Разход:");
  let val = -Math.abs(parseFloat(prompt("Сума:")));
  if(!name || isNaN(val)) return;

  await save(name, val);
}

// 💎 БОНУС
async function addBonus(){
  let val = parseFloat(prompt("Бонус:"));
  if(isNaN(val)) return;

  await save("бонус", val);
}

// 🔥 SAVE (тук беше проблемът)
async function save(name, amount){

  const { error } = await supabase.from("transactions").insert({
    user_id: user.id,
    name: name,
    amount: amount
  });

  if(error){
    alert("❌ НЕ ЗАПИСВА: " + error.message);
    console.error(error);
    return;
  }

  load();
}

// 🔄 LOAD
async function load(){

  const { data, error } = await supabase
    .from("transactions")
    .select("*")
    .eq("user_id", user.id);

  if(error){
    alert("LOAD ERROR: " + error.message);
    return;
  }

  render(data || []);
}

// 🎨 RENDER
function render(data){
  let bal=0;
  const list = document.getElementById("list");
  list.innerHTML="";

  data.forEach(t=>{
    bal += Number(t.amount);

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${t.name}: ${Number(t.amount).toFixed(2)} €
    `;
    list.appendChild(div);
  });

  document.getElementById("balance").innerText = bal.toFixed(2)+" €";
}

init();
</script>

</body>
</html>
